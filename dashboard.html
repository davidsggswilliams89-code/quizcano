<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>QUIZCANO Admin Dashboard</title>

<style>

/* =========================================================
SECTION 01
HEADER CSS
========================================================= */

/* Reset */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#0B1120;

font-family:Arial,Helvetica,sans-serif;

color:#FFFFFF;

}

/* Header */

.dashboard-header{

width:100%;

padding:60px 20px 40px;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

}

/* Wrapper */

.dashboard-header-content{

width:100%;

max-width:700px;

}

/* Logo */

.dashboard-logo{

font-size:46px;

font-weight:900;

letter-spacing:1px;

}

.logo-white{

color:#FFFFFF;

}

.logo-orange{

color:#F59E0B;

}

/* Title */

.dashboard-title{

margin-top:18px;

font-size:32px;

font-weight:800;

}

/* Description */

.dashboard-description{

margin-top:15px;

font-size:16px;

line-height:1.7;

color:#9CA3AF;

}

/* =========================================================
END OF SECTION 01 CSS
========================================================= */

/* =========================================================
SECTION 02
ADMIN MENU CSS
========================================================= */

.dashboard-menu-section{

width:100%;

max-width:1000px;

margin:0 auto;

padding:0 20px 40px;

}

.dashboard-menu-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}

.dashboard-menu-card{

background:#111827;

border:2px solid #1F2937;

border-radius:20px;

padding:28px 20px;

text-align:center;

cursor:pointer;

transition:.25s;

}

.dashboard-menu-card:hover{

border-color:#F59E0B;

transform:translateY(-5px);

box-shadow:0 12px 28px rgba(245,158,11,.18);

}

.dashboard-menu-card:active{

transform:scale(.98);

}

.dashboard-menu-icon{

font-size:46px;

margin-bottom:15px;

}

.dashboard-menu-title{

font-size:20px;

font-weight:800;

margin-bottom:10px;

color:#FFFFFF;

}

.dashboard-menu-description{

font-size:15px;

line-height:1.6;

color:#9CA3AF;

}

/* =========================================================
END OF SECTION 02 CSS
========================================================= */
/* =========================================================
SECTION 03
CREATE SUB CATEGORY CSS
========================================================= */

.createSubCategorySection{

display:none;

width:100%;

max-width:750px;

margin:30px auto;

padding:28px;

background:#111827;

border:2px solid #1F2937;

border-radius:20px;

}

.createSubCategorySection.show{

display:block;

}

.sectionTitle{

font-size:28px;

font-weight:800;

text-align:center;

margin-bottom:25px;

}

.formLabel{

display:block;

margin-bottom:10px;

font-size:15px;

font-weight:700;

color:#FFFFFF;

}

.formInput{

width:100%;

height:56px;

padding:0 16px;

margin-bottom:20px;

border:2px solid #1F2937;

border-radius:12px;

background:#0B1120;

color:#FFFFFF;

font-size:16px;

outline:none;

}

.formInput:focus{

border-color:#F59E0B;

}

input[type=file].formInput{

height:auto;

padding:14px;

}

.bannerPreviewContainer{

width:100%;

height:220px;

border:2px dashed #374151;

border-radius:14px;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

background:#0B1120;

margin-bottom:22px;

}

.bannerPreviewImage{

width:100%;

height:100%;

object-fit:cover;

display:none;

}

.bannerPreviewText{

color:#9CA3AF;

font-size:15px;

}

.primaryButton{

width:100%;

height:58px;

border:none;

border-radius:14px;

background:#F59E0B;

color:#FFFFFF;

font-size:18px;

font-weight:800;

cursor:pointer;

}

.primaryButton:hover{

opacity:.95;

}

/* =========================================================
END OF SECTION 03 CSS
========================================================= */
/* =========================================================
SECTION 04
MANAGE SUB CATEGORIES CSS
========================================================= */

.manageSubCategorySection{

display:none;

width:100%;

max-width:1100px;

margin:30px auto;

padding:28px;

background:#111827;

border:2px solid #1F2937;

border-radius:20px;

}

.manageSubCategorySection.show{

display:block;

}

.manageTitle{

font-size:28px;

font-weight:800;

text-align:center;

margin-bottom:25px;

}

.manageGrid{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(280px,1fr));

gap:22px;

}

.subCategoryCard{

background:#0B1120;

border:2px solid #1F2937;

border-radius:18px;

overflow:hidden;

}

.subCategoryBanner{

width:100%;

height:170px;

object-fit:cover;

display:block;

}

.subCategoryBody{

padding:18px;

}

.parentCategoryText{

font-size:13px;

color:#F59E0B;

font-weight:700;

margin-bottom:8px;

}

.subCategoryTitle{

font-size:20px;

font-weight:800;

margin-bottom:18px;

}

.subCategoryButtons{

display:flex;

gap:12px;

}

.editSubCategoryButton{

flex:1;

height:44px;

border:none;

border-radius:10px;

background:#2563EB;

color:#FFFFFF;

font-weight:700;

cursor:pointer;

}

.deleteSubCategoryButton{

flex:1;

height:44px;

border:none;

border-radius:10px;

background:#DC2626;

color:#FFFFFF;

font-weight:700;

cursor:pointer;

}

/* =========================================================
END OF SECTION 04 CSS
========================================================= */

  
</style>

</head>

<body>

<!-- =========================================================
SECTION 01
HEADER HTML
========================================================= -->

<header class="dashboard-header">

<div class="dashboard-header-content">

<h1 class="dashboard-logo">

<span class="logo-white">QUIZ</span><span class="logo-orange">CANO</span>

</h1>

<h2 class="dashboard-title">

Admin Dashboard

</h2>

<p class="dashboard-description">

Manage Quizcano from one powerful dashboard.<br>

Create sub categories, quizzes and manage everything from one place.

</p>

</div>

</header>

<!-- =========================================================
END OF SECTION 01 HTML
========================================================= -->
<!-- =========================================================
SECTION 02
ADMIN MENU HTML
========================================================= -->

<section class="dashboard-menu-section">

<div class="dashboard-menu-grid">

<button
id="createSubCategoryButton"
class="dashboard-menu-card">

<div class="dashboard-menu-icon">

📁

</div>

<h3 class="dashboard-menu-title">

Create Sub Category

</h3>

<p class="dashboard-menu-description">

Create a new sub category under Daily Challenges, Quiz Category or Popular Quiz.

</p>

</button>


<button
id="manageSubCategoryButton"
class="dashboard-menu-card">

<div class="dashboard-menu-icon">

🗂️

</div>

<h3 class="dashboard-menu-title">

Manage Sub Categories

</h3>

<p class="dashboard-menu-description">

Edit banners, rename or delete existing sub categories.

</p>

</button>


<button
id="createQuizButton"
class="dashboard-menu-card">

<div class="dashboard-menu-icon">

➕

</div>

<h3 class="dashboard-menu-title">

Create Quiz

</h3>

<p class="dashboard-menu-description">

Create quizzes inside any existing sub category.

</p>

</button>


<button
id="manageQuizButton"
class="dashboard-menu-card">

<div class="dashboard-menu-icon">

📝

</div>

<h3 class="dashboard-menu-title">

Manage Quizzes

</h3>

<p class="dashboard-menu-description">

Filter quizzes by Mother Category then Sub Category.

</p>

</button>


<button
id="logoutButton"
class="dashboard-menu-card">

<div class="dashboard-menu-icon">

🚪

</div>

<h3 class="dashboard-menu-title">

Logout

</h3>

<p class="dashboard-menu-description">

Securely sign out from the admin dashboard.

</p>

</button>

</div>

</section>

<!-- =========================================================
END OF SECTION 02 HTML
========================================================= -->
<!-- =========================================================
SECTION 03
CREATE SUB CATEGORY HTML
========================================================= -->

<section
id="createSubCategorySection"
class="createSubCategorySection">

<h2 class="sectionTitle">

Create Sub Category

</h2>

<label class="formLabel">

Mother Category

</label>

<select
id="motherCategory"
class="formInput">

<option value="">

Select Mother Category

</option>

<option value="dailyChallenge">

Daily Challenges

</option>

<option value="quizCategory">

Quiz Category

</option>

<option value="popularQuiz">

Popular Quiz

</option>

</select>

<label class="formLabel">

Sub Category Name

</label>

<input
type="text"
id="subCategoryName"
class="formInput"
placeholder="Example : Football">

<label class="formLabel">

Banner Image

</label>

<input
type="file"
id="subCategoryBanner"
class="formInput"
accept="image/*">

<div class="bannerPreviewContainer">

<img
id="bannerPreviewImage"
class="bannerPreviewImage">

<p
id="bannerPreviewText"
class="bannerPreviewText">

No Banner Selected

</p>

</div>

<button
id="saveSubCategoryButton"
class="primaryButton">

Save Sub Category

</button>

</section>

<!-- =========================================================
END OF SECTION 03 HTML
========================================================= -->
<!-- =========================================================
SECTION 04
MANAGE SUB CATEGORIES HTML
========================================================= -->

<section
id="manageSubCategorySection"
class="manageSubCategorySection">

<h2 class="manageTitle">

Manage Sub Categories

</h2>

<div
id="manageGrid"
class="manageGrid">

</div>

</section>

<!-- =========================================================
END OF SECTION 04 HTML
========================================================= -->


  
<script type="module">

/* =========================================================
SECTION 01
HEADER JAVASCRIPT
========================================================= */

/*
Section 01 contains no JavaScript.
Reserved for future header features.
*/

/* =========================================================
END OF SECTION 01 JAVASCRIPT
========================================================= */

/* =========================================================
SECTION 02
ADMIN MENU JAVASCRIPT
========================================================= */

const createSubCategoryButton =
document.getElementById("createSubCategoryButton");

const manageSubCategoryButton =
document.getElementById("manageSubCategoryButton");

const createQuizButton =
document.getElementById("createQuizButton");

const manageQuizButton =
document.getElementById("manageQuizButton");

const logoutButton =
document.getElementById("logoutButton");

/*
Navigation will be connected
when each section is created.
*/

/* =========================================================
END OF SECTION 02 JAVASCRIPT
========================================================= */
/* =========================================================
SECTION 03
CREATE SUB CATEGORY JAVASCRIPT
========================================================= */

const createSubCategorySection=
document.getElementById("createSubCategorySection");

const motherCategory=
document.getElementById("motherCategory");

const subCategoryName=
document.getElementById("subCategoryName");

const subCategoryBanner=
document.getElementById("subCategoryBanner");

const bannerPreviewImage=
document.getElementById("bannerPreviewImage");

const bannerPreviewText=
document.getElementById("bannerPreviewText");

const saveSubCategoryButton=
document.getElementById("saveSubCategoryButton");

/* Open Section */

createSubCategoryButton.onclick=()=>{

createSubCategorySection.classList.add("show");

};

/* Banner Preview */

subCategoryBanner.onchange=()=>{

const file=subCategoryBanner.files[0];

if(!file){

bannerPreviewImage.style.display="none";

bannerPreviewText.style.display="block";

return;

}

const reader=new FileReader();

reader.onload=(e)=>{

bannerPreviewImage.src=e.target.result;

bannerPreviewImage.style.display="block";

bannerPreviewText.style.display="none";

};

reader.readAsDataURL(file);

};

/*
Save Sub Category

Cloudinary upload and Firebase save
will be connected in the next part.
*/

/* =========================================================
END OF SECTION 03 JAVASCRIPT
========================================================= */
/* =========================================================
SECTION 04
MANAGE SUB CATEGORIES JAVASCRIPT
========================================================= */

const manageSubCategorySection=
document.getElementById("manageSubCategorySection");

const manageGrid=
document.getElementById("manageGrid");

/* Open Section */

manageSubCategoryButton.onclick=()=>{

manageSubCategorySection.classList.add("show");

loadSubCategories();

};

/* Load Sub Categories */

async function loadSubCategories(){

manageGrid.innerHTML="";

const snapshot=await getDocs(
collection(db,"subCategories")
);

snapshot.forEach((docItem)=>{

const item=docItem.data();

manageGrid.innerHTML+=`

<div class="subCategoryCard">

<img
src="${item.banner}"
class="subCategoryBanner">

<div class="subCategoryBody">

<div class="parentCategoryText">

${item.parentCategory}

</div>

<div class="subCategoryTitle">

${item.name}

</div>

<div class="subCategoryButtons">

<button
class="editSubCategoryButton"
data-id="${docItem.id}">

Edit

</button>

<button
class="deleteSubCategoryButton"
data-id="${docItem.id}">

Delete

</button>

</div>

</div>

</div>

`;

});

}

/* =========================================================
END OF SECTION 04 JAVASCRIPT
========================================================= */


  
</script>

</body>

</html>

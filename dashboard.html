/* =========================================================
SECTION 01
ADMIN DASHBOARD HEADER CSS
========================================================= */

/* ===========================
Reset
=========================== */

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

body{

    background:#0B1120;

    font-family:Arial,Helvetica,sans-serif;

    color:#FFFFFF;

}

/* ===========================
Dashboard Header
=========================== */

.dashboard-header{

    width:100%;

    padding:60px 20px 35px;

    display:flex;

    justify-content:center;

    align-items:center;

    text-align:center;

}

/* ===========================
Title Area
=========================== */

.dashboard-title-area{

    width:100%;

    max-width:600px;

}

/* ===========================
Dashboard Logo
=========================== */

.dashboard-logo{

    font-size:42px;

    font-weight:900;

    letter-spacing:1px;

    line-height:1;

}

/* ===========================
Logo Colors
=========================== */

.logo-white{

    color:#FFFFFF;

}

.logo-orange{

    color:#F59E0B;

}

/* ===========================
Dashboard Title
=========================== */

.dashboard-title{

    margin-top:18px;

    font-size:30px;

    font-weight:800;

    color:#FFFFFF;

}

/* ===========================
Dashboard Description
=========================== */

.dashboard-description{

    margin-top:12px;

    font-size:16px;

    line-height:1.7;

    color:#9CA3AF;

}

/* =========================================================
END OF SECTION 01 CSS
========================================================= */
/* =========================================================
SECTION 02
ADMIN MENU CARDS CSS
========================================================= */

/* ===========================
Menu Section
=========================== */

.dashboard-menu-section{

    width:100%;

    max-width:950px;

    margin:0 auto;

    padding:0 20px 40px;

}

/* ===========================
Menu Grid
=========================== */

.dashboard-menu-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:18px;

}

/* ===========================
Menu Card
=========================== */

.dashboard-menu-card{

    background:#111827;

    border:2px solid #1F2937;

    border-radius:20px;

    padding:26px 18px;

    color:#FFFFFF;

    cursor:pointer;

    transition:.25s ease;

    text-align:center;

}

/* ===========================
Hover
=========================== */

.dashboard-menu-card:hover{

    border-color:#F59E0B;

    transform:translateY(-4px);

    box-shadow:0 10px 28px rgba(245,158,11,.22);

}

/* ===========================
Pressed
=========================== */

.dashboard-menu-card:active{

    transform:scale(.98);

}

/* ===========================
Menu Icon
=========================== */

.dashboard-menu-icon{

    font-size:42px;

    margin-bottom:14px;

}

/* ===========================
Menu Title
=========================== */

.dashboard-menu-title{

    font-size:19px;

    font-weight:800;

    margin-bottom:10px;

}

/* ===========================
Menu Description
=========================== */

.dashboard-menu-description{

    font-size:14px;

    line-height:1.6;

    color:#9CA3AF;

}

/* ===========================
Responsive
=========================== */

@media(max-width:650px){

    .dashboard-menu-grid{

        grid-template-columns:1fr;

    }

}

/* =========================================================
END OF SECTION 02 CSS
========================================================= */    
/* =========================================================
SECTION 03
CREATE CATEGORY CSS
========================================================= */

/* ===========================
Create Category Section
=========================== */

.create-category-section{

    display:none;

    width:100%;

    max-width:720px;

    margin:30px auto;

    padding:28px;

    background:#111827;

    border:2px solid #1F2937;

    border-radius:22px;

}

/* ===========================
Show Section
=========================== */

.create-category-section.show{

    display:block;

}

/* ===========================
Section Title
=========================== */

.create-category-title{

    font-size:28px;

    font-weight:800;

    text-align:center;

    margin-bottom:28px;

}

/* ===========================
Label
=========================== */

.create-category-label{

    display:block;

    margin-bottom:10px;

    font-size:15px;

    font-weight:700;

}

/* ===========================
Input
=========================== */

.create-category-input{

    width:100%;

    height:56px;

    margin-bottom:22px;

    padding:0 16px;

    border:2px solid #1F2937;

    border-radius:14px;

    background:#0B1120;

    color:#FFFFFF;

    font-size:16px;

    outline:none;

}

/* ===========================
Focus
=========================== */

.create-category-input:focus{

    border-color:#F59E0B;

}

/* ===========================
File Input
=========================== */

input[type=file].create-category-input{

    height:auto;

    padding:14px;

}

/* ===========================
Save Button
=========================== */

.save-category-button{

    width:100%;

    height:58px;

    border:none;

    border-radius:16px;

    background:#F59E0B;

    color:#FFFFFF;

    font-size:18px;

    font-weight:800;

    cursor:pointer;

    transition:.25s;

}

/* ===========================
Hover
=========================== */

.save-category-button:hover{

    transform:translateY(-2px);

}

/* ===========================
Disabled
=========================== */

.save-category-button:disabled{

    opacity:.7;

    cursor:not-allowed;

}

/* =========================================================
END OF SECTION 03 CSS
========================================================= */
/* =========================================================
SECTION 07
MANAGE CATEGORIES CSS

Manage Section

========================================================= */

/* ===========================
Preview Selected Banner
=========================== */

categoryBanner.addEventListener("change", () => {

    const file = categoryBanner.files[0];

    if(!file){

        categoryPreview.src = "";

        categoryPreview.style.display = "none";

        categoryPreviewText.style.display = "block";

        categoryPreviewText.textContent =
        "No banner selected.";

        return;

    }

    const reader = new FileReader();

    reader.onload = (event) => {

        categoryPreview.src =
        event.target.result;

        categoryPreview.style.display =
        "block";

        categoryPreviewText.style.display =
        "none";

    };

    reader.readAsDataURL(file);

});

const CLOUDINARY_CLOUD_NAME =
"db92r6j9z";

const CLOUDINARY_UPLOAD_PRESET =
"Ummuhalti";
/* ===========================
Upload Banner
=========================== */

async function uploadCategoryBanner(file){

    if(!file){

        return "";

    }

    const formData = new FormData();

    formData.append(
        "file",
        file
    );

    formData.append(
    "upload_preset",
    CLOUDINARY_UPLOAD_PRESET
);

    const response = await fetch(

        `https://api.cloudinary.com/v1_1/db92r6j9z/image/upload`,

        {

            method:"POST",

            body:formData

        }

    );

    if(!response.ok){

        throw new Error(
            "Banner upload failed."
        );

    }

    const data =
    await response.json();

    return data.secure_url;

}

/* ===========================
Save Category
=========================== */

saveCategoryButton.addEventListener(
"click",
async()=>{

    const location =
    categoryLocation.value.trim();

    const name =
    categoryName.value.trim();

    const file =
    categoryBanner.files[0];

    /* ===========================
    Validation
    =========================== */

    if(!location || !name){

        alert(
        "Please complete all fields."
        );

        return;

    }

    if(
        !editingCategoryId &&
        !file
    ){

        alert(
        "Please select a banner."
        );

        return;

    }

    try{

        saveCategoryButton.disabled =
        true;

        saveCategoryButton.textContent =
        "Saving...";

        /* ===========================
        Update Category
        =========================== */

        if(editingCategoryId){

            await updateCategory();

            return;

        }

        /* ===========================
        Create New Category
        =========================== */

        const bannerUrl =
        await uploadCategoryBanner(file);

        await addDoc(

            collection(
                db,
                "categories"
            ),

            {

                name:name,

                location:location,

                banner:bannerUrl,

                createdAt:
                serverTimestamp()

            }

        );

        alert(
        "Category created successfully."
        );

        categoryLocation.value = "";

        categoryName.value = "";

        categoryBanner.value = "";

        categoryPreview.src = "";

        categoryPreview.style.display =
        "none";

        categoryPreviewText.style.display =
        "block";

        categoryPreviewText.textContent =
        "No banner selected.";

    }

    catch(error){

        console.error(error);

        alert(error.message);

    }

    finally{

        saveCategoryButton.disabled =
        false;

        if(editingCategoryId){

            saveCategoryButton.textContent =
            "Update Category";

        }else{

            saveCategoryButton.textContent =
            "Save Category";

        }

    }

});

async function loadCategories(){

    categoryList.innerHTML = "";

    const snapshot =
    await getDocs(

        collection(
            db,
            "categories"
        )

    );

    snapshot.forEach((document)=>{

        const category =
        document.data();

        categoryList.innerHTML += `

        <div class="category-card">

            <img
            src="${category.banner}"
            alt="${category.name}">

            <div
            class="category-card-content">

                <h3
                class="category-card-title">

                    ${category.name}

                </h3>

                <p
                class="category-card-location">

                    ${category.location}

                </p>

                <div
                class="category-card-buttons">

                    <button
                    class="edit-category-btn"
                    data-id="${document.id}">

                        Edit

                    </button>

                    <button
                    class="delete-category-btn"
                    data-id="${document.id}">

                        Delete

                    </button>

                </div>

            </div>

        </div>

        `;

    });

}

document.getElementById("nextQuestionButton");

/* ===========================

=========================== */

/* ===========================

/* ===========================

=========================== */

function resetQuizBuilder(){

    currentQuestion = 1;

    quizQuestions = [];

    currentQuestionLabel.textContent =
    "Question 1";

    nextQuestionButton.style.display =
    "block";

    saveQuizButton.style.display =
    "none";

}


/* ===========================
Load Categories
=========================== */

async function loadQuizCategories(){

    quizCategory.innerHTML = `
        <option value="">
            Select Category
        </option>
    `;

    const snapshot =
    await getDocs(
        collection(db,"categories")
    );

    snapshot.forEach((item)=>{

        const data =
        item.data();

        quizCategory.innerHTML += `
            <option value="${item.id}">
                ${data.name}
            </option>
        `;

    });

}


/* ===========================
Upload Question Image
=========================== */

async function uploadQuestionImage(file){

    if(!file){

        return "";

    }

    const formData =
    new FormData();

    formData.append(
        "file",
        file
    );

    formData.append(
        "upload_preset",
        CLOUDINARY_UPLOAD_PRESET
    );

    const response =
    await fetch(
        "https://api.cloudinary.com/v1_1/db92r6j9z/image/upload",
        {
            method:"POST",
            body:formData
        }
    );

    const data =
    await response.json();

    return data.secure_url;

}


/* ===========================
Next Question
=========================== */

nextQuestionButton.addEventListener(
"click",
async()=>{

    if(

        !quizTitle.value ||

        !totalQuestions.value ||

        !quizCategory.value ||

        !optionA.value ||

        !optionB.value ||

        !optionC.value ||

        !optionD.value ||

        !correctAnswer.value

    ){

        alert("Please complete all fields.");

        return;

    }

    let imageUrl = "";

    if(questionImage.files.length > 0){

        imageUrl =
        await uploadQuestionImage(
            questionImage.files[0]
        );

    }

    quizQuestions.push({

        questionNumber:currentQuestion,

        questionImage:imageUrl,

        options:{

            A:optionA.value.trim(),

            B:optionB.value.trim(),

            C:optionC.value.trim(),

            D:optionD.value.trim()

        },

        correctAnswer:
        correctAnswer.value

    });

    currentQuestion++;

    optionA.value="";

    optionB.value="";

    optionC.value="";

    optionD.value="";

    correctAnswer.value="";

    questionImage.value="";

    currentQuestionLabel.textContent =
    "Question " + currentQuestion;

    if(
        currentQuestion >
        parseInt(totalQuestions.value)
    ){

        nextQuestionButton.style.display =
        "none";

        saveQuizButton.style.display =
        "block";

    }

});

/* =========================================================
END OF SECTION 12 PART 1
========================================================= */
/* =========================================================
SECTION 12
PART 2
SAVE COMPLETE QUIZ
========================================================= */

saveQuizButton.addEventListener(
"click",
async()=>{

    if(editingQuizId){

        await updateQuiz();

        return;

    }

    if(quizQuestions.length !== parseInt(totalQuestions.value)){

        alert("Please complete all questions.");

        return;

    }

    try{

        saveQuizButton.disabled = true;

        saveQuizButton.textContent =
        "Saving Quiz...";

        await addDoc(

            collection(db,"quizzes"),

            {

                quizTitle:
                quizTitle.value.trim(),

                categoryId:
                quizCategory.value,

                totalQuestions:
                parseInt(totalQuestions.value),

                questions:
                quizQuestions,

                createdAt:
                serverTimestamp()

            }

        );

        alert(
        "Quiz saved successfully."
        );

        /* ===========================
        Reset Form
        =========================== */

        quizTitle.value = "";

        totalQuestions.value = "";

        quizCategory.value = "";

        optionA.value = "";

        optionB.value = "";

        optionC.value = "";

        optionD.value = "";

        correctAnswer.value = "";

        questionImage.value = "";

        quizQuestions = [];

        currentQuestion = 1;

        currentQuestionLabel.textContent =
        "Question 1";

        nextQuestionButton.style.display =
        "block";

        saveQuizButton.style.display =
        "none";

    }

    catch(error){

        console.error(error);

        alert(
        "Failed to save quiz."
        );

    }

    finally{

        saveQuizButton.disabled = false;

        saveQuizButton.textContent =
        "Save Quiz";

    }

});

/* ===========================
Load Quizzes
=========================== */

async function loadQuizzes(){

    quizList.innerHTML = "";

    try{

        const snapshot =
        await getDocs(
            collection(db,"quizzes")
        );

        if(snapshot.empty){

            quizList.innerHTML = `
                <h3 style="
                text-align:center;
                color:#9CA3AF;
                grid-column:1/-1;">
                    No quizzes found.
                </h3>
            `;

            return;

        }

        for(const document of snapshot.docs){

            const quiz =
            document.data();

            let categoryName = "Unknown";

            try{

                const categorySnapshot =
                await getDoc(
                    doc(
                        db,
                        "categories",
                        quiz.categoryId
                    )
                );

                if(categorySnapshot.exists()){

                    categoryName =
                    categorySnapshot.data().name;

                }

            }

            catch(error){

                console.log(error);

            }

            quizList.innerHTML += `

            <div class="quiz-card">

                <div class="quiz-card-content">

                    <h3 class="quiz-card-title">

                        ${quiz.quizTitle}

                    </h3>

                    <div class="quiz-option">

                        Category:
                        ${categoryName}

                    </div>

                    <div class="quiz-option">

                        Total Questions:
                        ${quiz.totalQuestions}

                    </div>

                    <div class="quiz-option">

                        Saved Questions:
                        ${quiz.questions.length}

                    </div>

                    <div class="quiz-card-buttons">

                        <button
                        class="edit-quiz-btn"
                        data-id="${document.id}">

                            Edit

                        </button>

                        <button
                        class="delete-quiz-btn"
                        data-id="${document.id}">

                            Delete

                        </button>

                    </div>

                </div>

            </div>

            `;

        }

    }

    catch(error){

        console.error(error);

        alert(
        "Failed to load quizzes."
        );

    }

}

/* ===========================

=========================== */

async function updateQuiz(){

    try{

        saveQuizButton.disabled = true;

        saveQuizButton.textContent =
        "Updating...";

        let imageUrl = "";

        const image =
        questionImage.files[0];

        if(image){

            imageUrl =
            await uploadQuestionImage(image);

        }

        else{

            const snapshot =
            await getDoc(

                doc(
                    db,
                    "quizzes",
                    editingQuizId
                )

            );

            imageUrl =
            snapshot.data().questionImage;

        }

        await updateDoc(

            doc(
                db,
                "quizzes",
                editingQuizId
            ),

            {

                quizTitle:
                quizTitle.value.trim(),

                questionNumber:
                questionNumber.value,

                categoryId:
                quizCategory.value,

                questionImage:
                imageUrl,

                options:{

                    A:
                    optionA.value.trim(),

                    B:
                    optionB.value.trim(),

                    C:
                    optionC.value.trim(),

                    D:
                    optionD.value.trim()

                },

                correctAnswer:
                correctAnswer.value

            }

        );

        alert(
        "Quiz updated successfully."
        );

        editingQuizId = null;

        quizTitle.value = "";

        questionNumber.value = "";

        quizCategory.value = "";

        questionImage.value = "";

        optionA.value = "";

        optionB.value = "";

        optionC.value = "";

        optionD.value = "";

        correctAnswer.value = "";

        saveQuizButton.textContent =
        "Save Question";

        saveQuizButton.classList.remove(
        "save-quiz-update"
        );

        createQuizSection.classList.remove(
        "show"
        );

        manageQuizSection.classList.add(
        "show"
        );

        loadQuizzes();

    }

    catch(error){

        console.error(error);

        alert(
        "Failed to update quiz."
        );

    }

    finally{

        saveQuizButton.disabled =
        false;

    }

}

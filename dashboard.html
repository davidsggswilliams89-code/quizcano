/* ===========================
Reset
=========================== */

*{

/* ===========================

=========================== */

.dashboard-header{

}

Title Area
=========================== */

    width:100%;

}

/* ===========================
Dashboard Logo
=========================== */

.dashboard-logo{

    font-size:42px;

}

/* ===========================
Logo Colors
=========================== */

/* ===========================
Dashboard Title
=========================== */

/* ===========================
Dashboard Description
=========================== */

=========================== */

.dashboard-menu-section{

}

/* ===========================
Menu Grid
=========================== */

.dashboard-menu-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

}

/* ===========================
Menu Card
=========================== */

.dashboard-menu-card{

    background:#111827;

    cursor:pointer;

/* ===========================
Hover
=========================== */

.dashboard-menu-card:hover{

    border-color:#F59E0B;

    transform:translateY(-4px);

    box-shadow:0 10px 28px rgba(245,158,11,.22);

}

/* ===========================
Pressed
=========================== */

.dashboard-menu-card:active{

    transform:scale(.98);

}

/* ===========================
Menu Icon
=========================== */

.dashboard-menu-icon{

/* ===========================
Menu Title
=========================== */

/* ===========================
Menu Description
=========================== */

}

Responsive
=========================== */

@media(max-width:650px){

    .dashboard-menu-grid{

/* ===========================
Preview Selected Banner
=========================== */

categoryBanner.addEventListener("change", () => {

    const file = categoryBanner.files[0];

    if(!file){

        categoryPreview.src = "";

        categoryPreview.style.display = "none";

        categoryPreviewText.style.display = "block";

        categoryPreviewText.textContent =
        "No banner selected.";

        return;

    }

    const reader = new FileReader();

    reader.onload = (event) => {

        categoryPreview.src =
        event.target.result;

        categoryPreview.style.display =
        "block";

        categoryPreviewText.style.display =
        "none";

    };

    reader.readAsDataURL(file);

});

END OF SECTION 06

/* =========================================================
SECTION 07
CLOUDINARY IMAGE UPLOAD
========================================================= */

/* ===========================
Cloudinary Configuration
=========================== */

const CLOUDINARY_CLOUD_NAME =
"db92r6j9z";

const CLOUDINARY_UPLOAD_PRESET =
"Ummuhalti";
/* ===========================
Upload Banner
=========================== */

async function uploadCategoryBanner(file){

    if(!file){

        return "";

    }

    const formData = new FormData();

    formData.append(
        "file",
        file
    );

    formData.append(
    "upload_preset",
    CLOUDINARY_UPLOAD_PRESET
);

    const response = await fetch(

        `https://api.cloudinary.com/v1_1/db92r6j9z/image/upload`,

        {

            method:"POST",

            body:formData

        }

    );

    if(!response.ok){

        throw new Error(
            "Banner upload failed."
        );

    }

    const data =
    await response.json();

    return data.secure_url;

}

END OF SECTION 07

        /* ===========================

        =========================== */

        if(editingCategoryId){

            await updateCategory();

        =========================== */

        const bannerUrl =
        await uploadCategoryBanner(file);

        await addDoc(

        categoryName.value = "";

        categoryBanner.value = "";

        "block";

        "No banner selected.";

    }

    catch(error){

        console.error(error);

        alert(error.message);

    }

    finally{

        saveCategoryButton.disabled =
        false;

        if(editingCategoryId){

            saveCategoryButton.textContent =
            "Update Category";

        }else{

            saveCategoryButton.textContent =
            "Save Category";

    if(file){

        await uploadCategoryBanner(file);

    }

    await updateDoc(

        doc(
            db,

        ),

        {

/* ===========================
Upload Question Image
=========================== */

async function uploadQuestionImage(file){

    if(!file){

        return "";

    }


    const formData =
    new FormData();


    formData.append(
        "file",
        file
    );


    formData.append(
        "upload_preset",
        CLOUDINARY_UPLOAD_PRESET
    );


    const response =
    await fetch(

    "https://api.cloudinary.com/v1_1/db92r6j9z/image/upload",

    {

        method:"POST",

        body:formData

    }

    );


    const data =
    await response.json();


    return data.secure_url;


}

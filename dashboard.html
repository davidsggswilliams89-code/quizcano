<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>QUIZCANO - Admin Dashboard</title>

    <style>
/* =========================================================
SECTION 01
ADMIN DASHBOARD HEADER CSS
========================================================= */

/* ===========================
Reset
=========================== */

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

body{

    background:#0B1120;

    font-family:Arial,Helvetica,sans-serif;

    color:#FFFFFF;

}

/* ===========================
Dashboard Header
=========================== */

.dashboard-header{

    width:100%;

    padding:60px 20px 35px;

    display:flex;

    justify-content:center;

    align-items:center;

    text-align:center;

}

/* ===========================
Title Area
=========================== */

.dashboard-title-area{

    width:100%;

    max-width:600px;

}

/* ===========================
Dashboard Logo
=========================== */

.dashboard-logo{

    font-size:42px;

    font-weight:900;

    letter-spacing:1px;

    line-height:1;

}

/* ===========================
Logo Colors
=========================== */

.logo-white{

    color:#FFFFFF;

}

.logo-orange{

    color:#F59E0B;

}

/* ===========================
Dashboard Title
=========================== */

.dashboard-title{

    margin-top:18px;

    font-size:30px;

    font-weight:800;

    color:#FFFFFF;

}

/* ===========================
Dashboard Description
=========================== */

.dashboard-description{

    margin-top:12px;

    font-size:16px;

    line-height:1.7;

    color:#9CA3AF;

}

/* =========================================================
END OF SECTION 01 CSS
========================================================= */
/* =========================================================
SECTION 02
ADMIN MENU CARDS CSS
========================================================= */

/* ===========================
Menu Section
=========================== */

.dashboard-menu-section{

    width:100%;

    max-width:950px;

    margin:0 auto;

    padding:0 20px 40px;

}

/* ===========================
Menu Grid
=========================== */

.dashboard-menu-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:18px;

}

/* ===========================
Menu Card
=========================== */

.dashboard-menu-card{

    background:#111827;

    border:2px solid #1F2937;

    border-radius:20px;

    padding:26px 18px;

    color:#FFFFFF;

    cursor:pointer;

    transition:.25s ease;

    text-align:center;

}

/* ===========================
Hover
=========================== */

.dashboard-menu-card:hover{

    border-color:#F59E0B;

    transform:translateY(-4px);

    box-shadow:0 10px 28px rgba(245,158,11,.22);

}

/* ===========================
Pressed
=========================== */

.dashboard-menu-card:active{

    transform:scale(.98);

}

/* ===========================
Menu Icon
=========================== */

.dashboard-menu-icon{

    font-size:42px;

    margin-bottom:14px;

}

/* ===========================
Menu Title
=========================== */

.dashboard-menu-title{

    font-size:19px;

    font-weight:800;

    margin-bottom:10px;

}

/* ===========================
Menu Description
=========================== */

.dashboard-menu-description{

    font-size:14px;

    line-height:1.6;

    color:#9CA3AF;

}

/* ===========================
Responsive
=========================== */

@media(max-width:650px){

    .dashboard-menu-grid{

        grid-template-columns:1fr;

    }

}

/* =========================================================
END OF SECTION 02 CSS
========================================================= */    
/* =========================================================
SECTION 03
CREATE CATEGORY CSS
========================================================= */

/* ===========================
Create Category Section
=========================== */

.create-category-section{

    display:none;

    width:100%;

    max-width:720px;

    margin:30px auto;

    padding:28px;

    background:#111827;

    border:2px solid #1F2937;

    border-radius:22px;

}

/* ===========================
Show Section
=========================== */

.create-category-section.show{

    display:block;

}

/* ===========================
Section Title
=========================== */

.create-category-title{

    font-size:28px;

    font-weight:800;

    text-align:center;

    margin-bottom:28px;

}

/* ===========================
Label
=========================== */

.create-category-label{

    display:block;

    margin-bottom:10px;

    font-size:15px;

    font-weight:700;

}

/* ===========================
Input
=========================== */

.create-category-input{

    width:100%;

    height:56px;

    margin-bottom:22px;

    padding:0 16px;

    border:2px solid #1F2937;

    border-radius:14px;

    background:#0B1120;

    color:#FFFFFF;

    font-size:16px;

    outline:none;

}

/* ===========================
Focus
=========================== */

.create-category-input:focus{

    border-color:#F59E0B;

}

/* ===========================
File Input
=========================== */

input[type=file].create-category-input{

    height:auto;

    padding:14px;

}

/* ===========================
Save Button
=========================== */

.save-category-button{

    width:100%;

    height:58px;

    border:none;

    border-radius:16px;

    background:#F59E0B;

    color:#FFFFFF;

    font-size:18px;

    font-weight:800;

    cursor:pointer;

    transition:.25s;

}

/* ===========================
Hover
=========================== */

.save-category-button:hover{

    transform:translateY(-2px);

}

/* ===========================
Disabled
=========================== */

.save-category-button:disabled{

    opacity:.7;

    cursor:not-allowed;

}

/* =========================================================
END OF SECTION 03 CSS
========================================================= */
/* =========================================================
SECTION 07
MANAGE CATEGORIES CSS
========================================================= */

/* ===========================
Manage Section
=========================== */

.manage-category-section{

    display:none;

    width:100%;

    max-width:900px;

    margin:30px auto;

    padding:25px;

    background:#111827;

    border:2px solid #1F2937;

    border-radius:20px;

}

/* ===========================
Show Section
=========================== */

.manage-category-section.show{

    display:block;

}

/* ===========================
Title
=========================== */

.manage-category-title{

    font-size:26px;

    font-weight:800;

    text-align:center;

    margin-bottom:25px;

    color:#FFFFFF;

}

/* ===========================
Category List
=========================== */

.category-list{

    display:grid;

    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));

    gap:20px;

}

/* ===========================
Category Card
=========================== */

.category-card{

    background:#0B1120;

    border:2px solid #1F2937;

    border-radius:18px;

    overflow:hidden;

}

/* ===========================
Banner
=========================== */

.category-card img{

    width:100%;

    height:150px;

    object-fit:cover;

}

/* ===========================
Content
=========================== */

.category-card-content{

    padding:15px;

}

/* ===========================
Category Name
=========================== */

.category-card-title{

    font-size:18px;

    font-weight:800;

    margin-bottom:8px;

    color:#FFFFFF;

}

/* ===========================
Location
=========================== */

.category-card-location{

    font-size:14px;

    color:#9CA3AF;

    margin-bottom:16px;

}

/* ===========================
Buttons
=========================== */

.category-card-buttons{

    display:flex;

    gap:10px;

}

/* ===========================
Edit
=========================== */

.edit-category-btn{

    flex:1;

    height:42px;

    border:none;

    border-radius:10px;

    background:#2563EB;

    color:#FFFFFF;

    font-weight:700;

    cursor:pointer;

}

/* ===========================
Delete
=========================== */

.delete-category-btn{

    flex:1;

    height:42px;

    border:none;

    border-radius:10px;

    background:#DC2626;

    color:#FFFFFF;

    font-weight:700;

    cursor:pointer;

}

/* =========================================================
END OF SECTION 07 CSS
========================================================= */    

    
    </style>

</head>

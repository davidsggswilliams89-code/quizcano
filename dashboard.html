<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QUIZCANO - Admin Dashboard</title>

<style>

/* =========================================================
SECTION 01
ADMIN DASHBOARD HEADER CSS
========================================================= */

/* Reset */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0B1120;
    color:#FFFFFF;
    font-family:Arial,Helvetica,sans-serif;
}

/* Header */

.dashboard-header{

    width:100%;
    padding:60px 20px 40px;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

}

/* Content */

.dashboard-title-area{

    width:100%;
    max-width:700px;

}

/* Logo */

.dashboard-logo{

    font-size:46px;
    font-weight:900;
    letter-spacing:1px;

}

.logo-white{

    color:#FFFFFF;

}

.logo-orange{

    color:#F59E0B;

}

/* Title */

.dashboard-title{

    margin-top:18px;

    font-size:32px;

    font-weight:800;

    color:#FFFFFF;

}

/* Description */

.dashboard-description{

    margin-top:14px;

    color:#9CA3AF;

    font-size:16px;

    line-height:1.7;

}

/* =========================================================
END OF SECTION 01
========================================================= */
/* =========================================================
SECTION 03
ADMIN MENU CSS
========================================================= */

.dashboard-menu-section{

    width:100%;

    max-width:1000px;

    margin:0 auto;

    padding:0 20px 40px;

}

.dashboard-menu-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

    gap:20px;

}

.dashboard-menu-card{

    background:#111827;

    border:2px solid #1F2937;

    border-radius:20px;

    padding:28px 20px;

    text-align:center;

    cursor:pointer;

    transition:.25s;

}

.dashboard-menu-card:hover{

    border-color:#F59E0B;

    transform:translateY(-5px);

    box-shadow:0 12px 28px rgba(245,158,11,.18);

}

.dashboard-menu-card:active{

    transform:scale(.98);

}

.dashboard-menu-icon{

    font-size:44px;

    margin-bottom:15px;

}

.dashboard-menu-title{

    font-size:20px;

    font-weight:800;

    margin-bottom:10px;

}

.dashboard-menu-description{

    color:#9CA3AF;

    line-height:1.6;

    font-size:15px;

}

/* =========================================================
END OF SECTION 03 CSS
========================================================= */
/* =========================================================
SECTION 03
CREATE SUB CATEGORY
========================================================= */

.createSubCategorySection{
display:none;
max-width:700px;
margin:30px auto;
background:#111827;
padding:25px;
border-radius:18px;
border:2px solid #1F2937;
}

.createSubCategorySection.show{
display:block;
}

.sectionTitle{
font-size:26px;
font-weight:700;
margin-bottom:20px;
text-align:center;
}

.formLabel{
display:block;
margin-bottom:8px;
font-size:15px;
font-weight:600;
}

.formInput{
width:100%;
padding:14px;
margin-bottom:18px;
border-radius:10px;
border:2px solid #1F2937;
background:#0B1120;
color:#fff;
font-size:15px;
outline:none;
}

.formInput:focus{
border-color:#F59E0B;
}

.primaryButton{
width:100%;
padding:15px;
background:#F59E0B;
border:none;
border-radius:12px;
color:#fff;
font-size:17px;
font-weight:700;
cursor:pointer;
}

.primaryButton:hover{
opacity:.95;
}
    
</style>

</head>

<body>

<!-- =========================================================
SECTION 01
ADMIN DASHBOARD HEADER
========================================================= -->

<header class="dashboard-header">

    <div class="dashboard-title-area">

        <h1 class="dashboard-logo">

            <span class="logo-white">QUIZ</span><span class="logo-orange">CANO</span>

        </h1>

        <h2 class="dashboard-title">

            Admin Dashboard

        </h2>

        <p class="dashboard-description">

            Manage Quizcano from one powerful dashboard.

        </p>

    </div>

</header>

<!-- =========================================================
END OF SECTION 01
========================================================= -->  
<!-- =========================================================
SECTION 03
ADMIN MENU HTML
========================================================= -->

<section class="dashboard-menu-section">

<div class="dashboard-menu-grid">

<button
class="dashboard-menu-card"
id="createCategoryButton">

<div class="dashboard-menu-icon">
📁
</div>

<h3 class="dashboard-menu-title">

Create Category

</h3>

<p class="dashboard-menu-description">

Create Parent Categories and Sub Categories.

</p>

</button>

<button
class="dashboard-menu-card"
id="manageCategoryButton">

<div class="dashboard-menu-icon">
🗂
</div>

<h3 class="dashboard-menu-title">

Manage Categories

</h3>

<p class="dashboard-menu-description">

Edit or delete categories and sub categories.

</p>

</button>

<button
class="dashboard-menu-card"
id="createQuizButton">

<div class="dashboard-menu-icon">
➕
</div>

<h3 class="dashboard-menu-title">

Create Quiz

</h3>

<p class="dashboard-menu-description">

Create quizzes inside any sub category.

</p>

</button>

<button
class="dashboard-menu-card"
id="manageQuizButton">

<div class="dashboard-menu-icon">
📝
</div>

<h3 class="dashboard-menu-title">

Manage Quizzes

</h3>

<p class="dashboard-menu-description">

Filter quizzes by Category and Sub Category.

</p>

</button>

<button
class="dashboard-menu-card"
id="logoutButton">

<div class="dashboard-menu-icon">
🚪
</div>

<h3 class="dashboard-menu-title">

Logout

</h3>

<p class="dashboard-menu-description">

Securely sign out from dashboard.

</p>

</button>

</div>

</section>

<!-- =========================================================
END OF SECTION 03 HTML
========================================================= -->
<!-- =========================================================
SECTION 03
CREATE SUB CATEGORY
========================================================= -->

<section
id="createSubCategorySection"
class="createSubCategorySection">

<h2 class="sectionTitle">
Create Sub Category
</h2>

<label class="formLabel">
Mother Category
</label>

<select
id="motherCategory"
class="formInput">

<option value="">
Select Mother Category
</option>

<option value="dailyChallenge">
Daily Challenges
</option>

<option value="quizCategory">
Quiz Category
</option>

<option value="popularQuiz">
Popular Quiz
</option>

</select>

<label class="formLabel">
Sub Category Name
</label>

<input
type="text"
id="subCategoryName"
class="formInput"
placeholder="Example: Football">

<button
id="saveSubCategoryButton"
class="primaryButton">

Save Sub Category

</button>

</section>

    
<script type="module">

/* =========================================================
SECTION 01
JAVASCRIPT
========================================================= */

/* Section 01 contains no JavaScript */

/* =========================================================
END OF SECTION 01
========================================================= */
/* =========================================================
SECTION 02
HEADER INITIALIZATION
========================================================= */

// No JavaScript is required for this section.

/* =========================================================
END OF SECTION 02
========================================================= */
/* =========================================================
SECTION 03
ADMIN MENU JAVASCRIPT
========================================================= */

/* Dashboard Buttons */

const createCategoryButton =
document.getElementById("createCategoryButton");

const manageCategoryButton =
document.getElementById("manageCategoryButton");

const createQuizButton =
document.getElementById("createQuizButton");

const manageQuizButton =
document.getElementById("manageQuizButton");

const logoutButton =
document.getElementById("logoutButton");

/* Navigation will be connected in later sections. */

/* =========================================================
END OF SECTION 03 JAVASCRIPT
========================================================= */
/* =========================================================
SECTION 03
CREATE SUB CATEGORY
========================================================= */

const createSubCategorySection =
document.getElementById(
"createSubCategorySection"
);

const motherCategory =
document.getElementById(
"motherCategory"
);

const subCategoryName =
document.getElementById(
"subCategoryName"
);

const saveSubCategoryButton =
document.getElementById(
"saveSubCategoryButton"
);

/* Open Section */

createCategoryButton.onclick=()=>{

hideAllSections();

createSubCategorySection.classList.add("show");

};

/* Save */

saveSubCategoryButton.onclick=async()=>{

const parent=
motherCategory.value.trim();

const name=
subCategoryName.value.trim();

if(parent===""||name===""){

alert("Complete all fields.");

return;

}

await addDoc(

collection(db,"subCategories"),

{

parentCategory:parent,

name:name,

createdAt:serverTimestamp()

}

);

alert("Sub Category Created.");

motherCategory.value="";

subCategoryName.value="";

};

    
</script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>QUIZCANO Admin Dashboard</title>

<style>

/* =========================================================
SECTION 01
HEADER CSS
========================================================= */

/* Reset */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#0B1120;

font-family:Arial,Helvetica,sans-serif;

color:#FFFFFF;

}

/* Header */

.dashboard-header{

width:100%;

padding:60px 20px 40px;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

}

/* Wrapper */

.dashboard-header-content{

width:100%;

max-width:700px;

}

/* Logo */

.dashboard-logo{

font-size:46px;

font-weight:900;

letter-spacing:1px;

}

.logo-white{

color:#FFFFFF;

}

.logo-orange{

color:#F59E0B;

}

/* Title */

.dashboard-title{

margin-top:18px;

font-size:32px;

font-weight:800;

}

/* Description */

.dashboard-description{

margin-top:15px;

font-size:16px;

line-height:1.7;

color:#9CA3AF;

}

/* =========================================================
END OF SECTION 01 CSS
========================================================= */

</style>

</head>

<body>

<!-- =========================================================
SECTION 01
HEADER HTML
========================================================= -->

<header class="dashboard-header">

<div class="dashboard-header-content">

<h1 class="dashboard-logo">

<span class="logo-white">QUIZ</span><span class="logo-orange">CANO</span>

</h1>

<h2 class="dashboard-title">

Admin Dashboard

</h2>

<p class="dashboard-description">

Manage Quizcano from one powerful dashboard.<br>

Create sub categories, quizzes and manage everything from one place.

</p>

</div>

</header>

<!-- =========================================================
END OF SECTION 01 HTML
========================================================= -->

</html>

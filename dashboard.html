<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>QUIZCANO - Admin Dashboard</title>

    <style>
/* =========================================================
SECTION 01
ADMIN DASHBOARD HEADER CSS
========================================================= */

/* ===========================
Reset
=========================== */

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

body{

    background:#0B1120;

    font-family:Arial,Helvetica,sans-serif;

    color:#FFFFFF;

}

/* ===========================
Dashboard Header
=========================== */

.dashboard-header{

    width:100%;

    padding:60px 20px 35px;

    display:flex;

    justify-content:center;

    align-items:center;

    text-align:center;

}

/* ===========================
Title Area
=========================== */

.dashboard-title-area{

    width:100%;

    max-width:600px;

}

/* ===========================
Dashboard Logo
=========================== */

.dashboard-logo{

    font-size:42px;

    font-weight:900;

    letter-spacing:1px;

    line-height:1;

}

/* ===========================
Logo Colors
=========================== */

.logo-white{

    color:#FFFFFF;

}

.logo-orange{

    color:#F59E0B;

}

/* ===========================
Dashboard Title
=========================== */

.dashboard-title{

    margin-top:18px;

    font-size:30px;

    font-weight:800;

    color:#FFFFFF;

}

/* ===========================
Dashboard Description
=========================== */

.dashboard-description{

    margin-top:12px;

    font-size:16px;

    line-height:1.7;

    color:#9CA3AF;

}

/* =========================================================
END OF SECTION 01 CSS
========================================================= */
/* =========================================================
SECTION 02
ADMIN MENU CARDS CSS
========================================================= */

/* ===========================
Menu Section
=========================== */

.dashboard-menu-section{

    width:100%;

    max-width:950px;

    margin:0 auto;

    padding:0 20px 40px;

}

/* ===========================
Menu Grid
=========================== */

.dashboard-menu-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:18px;

}

/* ===========================
Menu Card
=========================== */

.dashboard-menu-card{

    background:#111827;

    border:2px solid #1F2937;

    border-radius:20px;

    padding:26px 18px;

    color:#FFFFFF;

    cursor:pointer;

    transition:.25s ease;

    text-align:center;

}

/* ===========================
Hover
=========================== */

.dashboard-menu-card:hover{

    border-color:#F59E0B;

    transform:translateY(-4px);

    box-shadow:0 10px 28px rgba(245,158,11,.22);

}

/* ===========================
Pressed
=========================== */

.dashboard-menu-card:active{

    transform:scale(.98);

}

/* ===========================
Menu Icon
=========================== */

.dashboard-menu-icon{

    font-size:42px;

    margin-bottom:14px;

}

/* ===========================
Menu Title
=========================== */

.dashboard-menu-title{

    font-size:19px;

    font-weight:800;

    margin-bottom:10px;

}

/* ===========================
Menu Description
=========================== */

.dashboard-menu-description{

    font-size:14px;

    line-height:1.6;

    color:#9CA3AF;

}

/* ===========================
Responsive
=========================== */

@media(max-width:650px){

    .dashboard-menu-grid{

        grid-template-columns:1fr;

    }

}

/* =========================================================
END OF SECTION 02 CSS
========================================================= */    
/* =========================================================
SECTION 03
CREATE CATEGORY CSS
========================================================= */

/* ===========================
Create Category Section
=========================== */

.create-category-section{

    display:none;

    width:100%;

    max-width:720px;

    margin:30px auto;

    padding:28px;

    background:#111827;

    border:2px solid #1F2937;

    border-radius:22px;

}

/* ===========================
Show Section
=========================== */

.create-category-section.show{

    display:block;

}

/* ===========================
Section Title
=========================== */

.create-category-title{

    font-size:28px;

    font-weight:800;

    text-align:center;

    margin-bottom:28px;

}

/* ===========================
Label
=========================== */

.create-category-label{

    display:block;

    margin-bottom:10px;

    font-size:15px;

    font-weight:700;

}

/* ===========================
Input
=========================== */

.create-category-input{

    width:100%;

    height:56px;

    margin-bottom:22px;

    padding:0 16px;

    border:2px solid #1F2937;

    border-radius:14px;

    background:#0B1120;

    color:#FFFFFF;

    font-size:16px;

    outline:none;

}

/* ===========================
Focus
=========================== */

.create-category-input:focus{

    border-color:#F59E0B;

}

/* ===========================
File Input
=========================== */

input[type=file].create-category-input{

    height:auto;

    padding:14px;

}

/* ===========================
Save Button
=========================== */

.save-category-button{

    width:100%;

    height:58px;

    border:none;

    border-radius:16px;

    background:#F59E0B;

    color:#FFFFFF;

    font-size:18px;

    font-weight:800;

    cursor:pointer;

    transition:.25s;

}

/* ===========================
Hover
=========================== */

.save-category-button:hover{

    transform:translateY(-2px);

}

/* ===========================
Disabled
=========================== */

.save-category-button:disabled{

    opacity:.7;

    cursor:not-allowed;

}

/* =========================================================
END OF SECTION 03 CSS
========================================================= */
/* =========================================================
SECTION 07
MANAGE CATEGORIES CSS
========================================================= */

/* ===========================
Manage Section
=========================== */

.manage-category-section{

    display:none;

    width:100%;

    max-width:900px;

    margin:30px auto;

    padding:25px;

    background:#111827;

    border:2px solid #1F2937;

    border-radius:20px;

}

/* ===========================
Show Section
=========================== */

.manage-category-section.show{

    display:block;

}

/* ===========================
Title
=========================== */

.manage-category-title{

    font-size:26px;

    font-weight:800;

    text-align:center;

    margin-bottom:25px;

    color:#FFFFFF;

}

/* ===========================
Category List
=========================== */

.category-list{

    display:grid;

    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));

    gap:20px;

}

/* ===========================
Category Card
=========================== */

.category-card{

    background:#0B1120;

    border:2px solid #1F2937;

    border-radius:18px;

    overflow:hidden;

}

/* ===========================
Banner
=========================== */

.category-card img{

    width:100%;

    height:150px;

    object-fit:cover;

}

/* ===========================
Content
=========================== */

.category-card-content{

    padding:15px;

}

/* ===========================
Category Name
=========================== */

.category-card-title{

    font-size:18px;

    font-weight:800;

    margin-bottom:8px;

    color:#FFFFFF;

}

/* ===========================
Location
=========================== */

.category-card-location{

    font-size:14px;

    color:#9CA3AF;

    margin-bottom:16px;

}

/* ===========================
Buttons
=========================== */

.category-card-buttons{

    display:flex;

    gap:10px;

}

/* ===========================
Edit
=========================== */

.edit-category-btn{

    flex:1;

    height:42px;

    border:none;

    border-radius:10px;

    background:#2563EB;

    color:#FFFFFF;

    font-weight:700;

    cursor:pointer;

}

/* ===========================
Delete
=========================== */

.delete-category-btn{

    flex:1;

    height:42px;

    border:none;

    border-radius:10px;

    background:#DC2626;

    color:#FFFFFF;

    font-weight:700;

    cursor:pointer;

}

/* =========================================================
END OF SECTION 07 CSS
========================================================= */    

    
    </style>

</head>

<body>

<!-- =========================================================
SECTION 01
ADMIN DASHBOARD HEADER HTML
========================================================= -->

<header class="dashboard-header">

    <div class="dashboard-title-area">

        <h1 class="dashboard-logo">

            <span class="logo-white">QUIZ</span><span class="logo-orange">CANO</span>

        </h1>

        <h2 class="dashboard-title">

            Admin Dashboard

        </h2>

        <p class="dashboard-description">

            Manage categories, quizzes and every Quizcano activity from one secure dashboard.

        </p>

    </div>

</header>

<!-- =========================================================
END OF SECTION 01 HTML
========================================================= -->
<!-- =========================================================
SECTION 02
ADMIN MENU CARDS HTML
========================================================= -->

<section class="dashboard-menu-section">

    <div class="dashboard-menu-grid">

        <!-- Create Category -->

        <button
            class="dashboard-menu-card"
            id="createCategoryButton">

            <div class="dashboard-menu-icon">

                📁

            </div>

            <h3 class="dashboard-menu-title">

                Create Category

            </h3>

            <p class="dashboard-menu-description">

                Add a new quiz category.

            </p>

        </button>

        <!-- Manage Categories -->

        <button
            class="dashboard-menu-card"
            id="manageCategoryButton">

            <div class="dashboard-menu-icon">

                🗂️

            </div>

            <h3 class="dashboard-menu-title">

                Manage Categories

            </h3>

            <p class="dashboard-menu-description">

                Edit or delete categories.

            </p>

        </button>

        <!-- Create Quiz -->

        <button
            class="dashboard-menu-card"
            id="createQuizButton">

            <div class="dashboard-menu-icon">

                ➕

            </div>

            <h3 class="dashboard-menu-title">

                Create Quiz

            </h3>

            <p class="dashboard-menu-description">

                Create quizzes with 20 questions.

            </p>

        </button>

        <!-- Manage Quiz -->

        <button
            class="dashboard-menu-card"
            id="manageQuizButton">

            <div class="dashboard-menu-icon">

                📝

            </div>

            <h3 class="dashboard-menu-title">

                Manage Quizzes

            </h3>

            <p class="dashboard-menu-description">

                Edit or delete quizzes.

            </p>

        </button>

        <!-- Logout -->

        <button
            class="dashboard-menu-card"
            id="logoutButton">

            <div class="dashboard-menu-icon">

                🚪

            </div>

            <h3 class="dashboard-menu-title">

                Logout

            </h3>

            <p class="dashboard-menu-description">

                Securely sign out.

            </p>

        </button>

    </div>

</section>

<!-- =========================================================
END OF SECTION 02 HTML
========================================================= -->
<!-- =========================================================
SECTION 03
CREATE CATEGORY HTML
========================================================= -->

<section
class="create-category-section"
id="createCategorySection">

    <h2 class="create-category-title">

        Create Category

    </h2>

    <!-- Display Location -->

    <label
    class="create-category-label">

        Display Category In

    </label>

    <select
    id="categoryLocation"
    class="create-category-input">

        <option value="">

            Select Location

        </option>

        <option value="dailyChallenge">

            Daily Challenge

        </option>

        <option value="quizCategory">

            Quiz Category

        </option>

        <option value="popularQuizzes">

            Popular Quizzes

        </option>

    </select>

    <!-- Category Name -->

    <label
    class="create-category-label">

        Category Name

    </label>

    <input

    type="text"

    id="categoryName"

    class="create-category-input"

    placeholder="Example: Football Quiz">

    <!-- Banner -->

    <label
    class="create-category-label">

        Category Banner

    </label>

    <input

    type="file"

    id="categoryBanner"

    class="create-category-input"

    accept="image/*">

    <!-- Preview -->

    <label
    class="create-category-label">

        Banner Preview

    </label>

    <div
    class="category-preview-container">

        <img

        id="categoryPreview"

        class="category-preview-image"

        src=""

        alt="Preview">

        <p

        id="categoryPreviewText"

        class="category-preview-text">

            No banner selected.

        </p>

    </div>

    <!-- Save -->

    <button

    id="saveCategoryButton"

    class="save-category-button">

        Save Category

    </button>

</section>

<!-- =========================================================
END OF SECTION 03 HTML
========================================================= -->    
<!-- =========================================================
SECTION 06
MANAGE CATEGORIES HTML
========================================================= -->

<section
    class="manage-category-section"
    id="manageCategorySection">

    <h2 class="manage-category-title">

        Manage Categories

    </h2>

    <div
        id="categoryList"
        class="category-list">

    </div>

</section>

<!-- =========================================================
END OF SECTION 06
========================================================= -->
    


    
<script type="module">
/* =========================================================
SECTION 04
CATEGORY BANNER PREVIEW JAVASCRIPT
========================================================= */

/* ===========================
Elements
=========================== */

const categoryBanner =
document.getElementById("categoryBanner");

const categoryPreview =
document.getElementById("categoryPreview");

const categoryPreviewText =
document.getElementById("categoryPreviewText");

/* ===========================
Preview Banner
=========================== */

categoryBanner.addEventListener(

"change",

function(){

    const file =
    this.files[0];

    if(!file){

        categoryPreview.src="";

        categoryPreview.classList.remove("show");

        categoryPreviewText.classList.remove("hide");

        categoryPreviewText.textContent=
        "No banner selected.";

        return;

    }

    const reader =
    new FileReader();

    reader.onload =
    function(event){

        categoryPreview.src =
        event.target.result;

        categoryPreview.classList.add("show");

        categoryPreviewText.classList.add("hide");

    };

    reader.readAsDataURL(file);

});

/* =========================================================
END OF SECTION 04
========================================================= */
/* =========================================================
SECTION 05
UPLOAD CATEGORY TO CLOUDINARY
AND SAVE TO FIRESTORE
========================================================= */

/* ===========================
Firestore Imports
=========================== */

import {
    collection,
    addDoc,
    getDocs,
    getDoc,
    deleteDoc,
    updateDoc,
    doc,
    serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";
    
/* ===========================
Elements
=========================== */

const saveCategoryButton =
document.getElementById("saveCategoryButton");

const categoryName =
document.getElementById("categoryName");

/* ===========================
Save Category
=========================== */

saveCategoryButton.addEventListener(

"click",

async function(){

    const file =
    categoryBanner.files[0];

    if(!categoryName.value.trim()){

        alert(
        "Please enter a category name."
        );

        return;

    }

    if(categoryLocation.value===""){

        alert(
        "Please select where to display this category."
        );

        return;

    }

    if(!file){

        alert(
        "Please select a category banner."
        );

        return;

    }

    saveCategoryButton.disabled=true;

    saveCategoryButton.textContent=
    "Uploading...";

    try{

        /* ===========================
        Upload To Cloudinary
        =========================== */

        const formData =
        new FormData();

        formData.append(
            "file",
            file
        );

        formData.append(
            "upload_preset",
            "ummuhalti"
        );

        const response =
        await fetch(

        "https://api.cloudinary.com/v1_1/db92r6j9z/image/upload",

        {

            method:"POST",

            body:formData

        });

        const result =
        await response.json();

        if(!response.ok){

            throw new Error(

                result.error.message

            );

        }

        /* ===========================
        Save To Firestore
        =========================== */

        /* ===========================
Create Or Update
=========================== */

if(editingCategoryId){

    await updateCategory(

        result.secure_url

    );

}

else{

    await addDoc(

        collection(
            db,
            "categories"
        ),

        {

            name:
            categoryName.value.trim(),

            location:
            categoryLocation.value,

            banner:
            result.secure_url,

            createdAt:
            serverTimestamp()

        }

    );

    alert(
    "Category saved successfully."
    );

    loadCategories();

}
        alert(
        "Category created successfully."
        );

        /* ===========================
        Reset Form
        =========================== */

        categoryName.value="";

        categoryLocation.value="";

        categoryBanner.value="";

        categoryPreview.src="";

        categoryPreview.classList.remove("show");

        categoryPreviewText.classList.remove("hide");

        categoryPreviewText.textContent=
        "No banner selected.";

    }

    catch(error){

        console.error(error);

        alert(
        "Error: " +
        error.message
        );

    }

    saveCategoryButton.disabled=false;

    saveCategoryButton.textContent=
    "Save Category";

});

/* =========================================================
END OF SECTION 05
========================================================= */
/* =========================================================
SECTION 08
LOAD CATEGORIES FROM FIRESTORE
========================================================= */

/* ===========================
Elements
=========================== */

const manageCategoryButton =
document.getElementById("manageCategoryButton");

const manageCategorySection =
document.getElementById("manageCategorySection");

const categoryList =
document.getElementById("categoryList");

/* ===========================
Open Manage Categories
=========================== */

manageCategoryButton.addEventListener(

"click",

function(){

    manageCategorySection.classList.add("show");

    manageCategorySection.scrollIntoView({

        behavior:"smooth"

    });

    loadCategories();

});

/* ===========================
Load Categories
=========================== */

async function loadCategories(){

    categoryList.innerHTML="Loading...";

    try{

        const snapshot =
        await getDocs(

            collection(
                db,
                "categories"
            )

        );

        categoryList.innerHTML="";

        if(snapshot.empty){

            categoryList.innerHTML=

            "<p>No categories found.</p>";

            return;

        }

        snapshot.forEach(function(doc){

            const data =
            doc.data();

            categoryList.innerHTML += `

            <div class="category-card">

                <img
                src="${data.banner}"
                alt="Banner">

                <div class="category-card-content">

                    <div class="category-card-title">

                        ${data.name}

                    </div>

                    <div class="category-card-location">

                        ${data.location}

                    </div>

                    <div class="category-card-buttons">

                        <button
                        class="edit-category-btn"
                        data-id="${doc.id}">

                        Edit

                        </button>

                        <button
                        class="delete-category-btn"
                        data-id="${doc.id}">

                        Delete

                        </button>

                    </div>

                </div>

            </div>

            `;

        });

    }

    catch(error){

        console.error(error);

        categoryList.innerHTML=

        "<p>Failed to load categories.</p>";

    }

}

/* =========================================================
END OF SECTION 08
========================================================= */
/* =========================================================
SECTION 09
DELETE CATEGORY FROM FIRESTORE
========================================================= */

/* ===========================
Delete Category
=========================== */

document.addEventListener(

"click",

async function(event){

    if(

        !event.target.classList.contains(

            "delete-category-btn"

        )

    ){

        return;

    }

    const categoryId =

    event.target.dataset.id;

    const confirmDelete =

    confirm(

        "Delete this category?"

    );

    if(!confirmDelete){

        return;

    }

    try{

        await deleteDoc(

            doc(

                db,

                "categories",

                categoryId

            )

        );

        alert(

            "Category deleted successfully."

        );

        loadCategories();

    }

    catch(error){

        console.error(error);

        alert(

            "Failed to delete category."

        );

    }

});

/* =========================================================
END OF SECTION 09
========================================================= */
/* =========================================================
SECTION 10
EDIT CATEGORY
========================================================= */

/* ===========================
Firestore Imports
=========================== */

import {
    getDoc
}
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

/* ===========================
Edit Category ID
=========================== */

let editingCategoryId = null;
/* ===========================
Current Banner
=========================== */

let currentBannerUrl = "";    

/* ===========================
Edit Category
=========================== */

document.addEventListener(

"click",

async function(event){

    if(

        !event.target.classList.contains(

            "edit-category-btn"

        )

    ){

        return;

    }

    editingCategoryId =

    event.target.dataset.id;

    try{

        const documentRef =

        doc(

            db,

            "categories",

            editingCategoryId

        );

        const documentSnap =

        await getDoc(documentRef);

        if(!documentSnap.exists()){

            alert("Category not found.");

            return;

        }

        const data =
documentSnap.data();

categoryName.value =
data.name;

categoryLocation.value =
data.location;

categoryPreview.src =
data.banner;

currentBannerUrl =
data.banner;

categoryPreview.classList.add("show");

categoryPreviewText.classList.add("hide");

        saveCategoryButton.textContent =
        "Update Category";

    }

    catch(error){

        console.error(error);

        alert(

            "Failed to load category."

        );

    }

});

/* =========================================================
END OF SECTION 10
========================================================= */
/* =========================================================
SECTION 11
UPDATE CATEGORY IN FIRESTORE
========================================================= */

/* ===========================
Firestore Imports
=========================== */

import {
    updateDoc
}
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

/* ===========================
Update Category
=========================== */

async function updateCategory(imageUrl){

    try{

        await updateDoc(

            doc(
                db,
                "categories",
                editingCategoryId
            ),

            {

                name:
                categoryName.value.trim(),

                location:
                categoryLocation.value,

                banner:
                imageUrl

            }

        );

        editingCategoryId = null;

        saveCategoryButton.textContent =
        "Save Category";

        loadCategories();

    }

    catch(error){

        console.error(error);

        alert(
        "Failed to update category."
        );

    }

}

/* =========================================================
END OF SECTION 11
========================================================= */
    
    
</script>

</body>

</html>

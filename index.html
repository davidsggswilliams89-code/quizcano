<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quizcano</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

    /* =========================================================
    SECTION 01
    BEGINNING OF HEADER CSS
    ========================================================= */

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins',sans-serif;
    }

    body{
        background:#0B1020;
        color:#ffffff;
    }

    .top-header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:18px;
    }

    .menu-btn{
        width:42px;
        height:42px;
        background:#1A2035;
        border-radius:12px;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:22px;
        cursor:pointer;
    }

    .logo-area{
        text-align:center;
        flex:1;
    }

    .logo-area h1{
        font-size:28px;
        font-weight:800;
        letter-spacing:1px;
    }

    .logo-area span{
        color:#FF9D00;
    }

    .logo-area p{
        font-size:12px;
        color:#8E98B8;
        margin-top:2px;
    }

    .right-icons{
        display:flex;
        align-items:center;
        gap:12px;
    }

    .notification{
        width:42px;
        height:42px;
        background:#1A2035;
        border-radius:12px;
        display:flex;
        justify-content:center;
        align-items:center;
        position:relative;
        font-size:18px;
    }

    .notification span{
        position:absolute;
        top:-4px;
        right:-4px;
        background:#FF3B30;
        width:18px;
        height:18px;
        border-radius:50%;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:10px;
        font-weight:bold;
    }

    .profile img{
        width:46px;
        height:46px;
        border-radius:50%;
        border:2px solid #FF9D00;
        object-fit:cover;
    }

/* =========================================================
SECTION 01
END OF HEADER CSS
========================================================= */

/* =========================================================
SECTION 02
BEGINNING OF YOU MAY PLAY CSS
========================================================= */

.section-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 18px 12px;
}

/* Section Title */
.section-header h2{
    font-size:14px;
    font-weight:700;
    color:#FFFFFF;
}

/* Explore Link */
.section-header a{
    text-decoration:none;
    color:#FF9D00;
    font-size:12px;
    font-weight:600;
}

.play-scroll{
    display:flex;
    gap:14px;
    overflow-x:auto;
    padding:0 18px 10px;
    scroll-behavior:smooth;
    scrollbar-width:none;
}

.play-scroll::-webkit-scrollbar{
    display:none;
}

/* Each Quiz Item */
.play-item{
    flex-shrink:0;
    width:75px;
}

.play-item img{
    width:75px;
    height:75px;
    border-radius:16px;
    object-fit:cover;
    display:block;
    transition:.3s;
}

.play-item img:hover{
    transform:scale(1.05);
}

/* Quiz Name */
.play-title{
    margin-top:6px;
    font-size:11px;
    font-weight:500;
    color:#E5E7EB;
    line-height:14px;
    text-align:left;

    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

/* ======================================================
END OF YOU MAY PLAY CSS
SECTION 02
========================================================= */
    </style>

</head>

<body>

<!-- =========================================================
SECTION 01
BEGINNING OF HEADER
========================================================= -->

<header class="top-header">

    <div class="menu-btn">
        ☰
    </div>

    <div class="logo-area">
        <h1>QUIZ<span>CANO</span></h1>
        <p>Play • Learn • Win</p>
    </div>

    <div class="right-icons">

        <div class="notification">
            🔔
            <span>3</span>
        </div>

        <div class="profile">
            <img src="https://i.pravatar.cc/100?img=12" alt="Profile">
        </div>

    </div>

</header>

<!-- =========================================================
SECTION 01
END OF HEADER  HTML
========================================================= -->

<!-- =========================================================
SECTION 02
BEGINNING OF YOU MAY PLAY
========================================================= -->

<section class="you-may-play">

    <div class="section-header">
        <h2>You May Play</h2>
        <a href="#">View All</a>
    </div>

    <div class="play-scroll">

        <!-- Card 1 -->
        <div class="play-item">
            <div class="play-card card-purple">
                <div class="play-icon">
                    🧠
                </div>

                <div class="play-title">
                    Brain Quiz
                </div>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="play-item">
            <div class="play-card card-orange">
                <div class="play-icon">
                    🎮
                </div>

                <div class="play-title">
                    Gaming
                </div>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="play-item">
            <div class="play-card card-blue">
                <div class="play-icon">
                    🎬
                </div>

                <div class="play-title">
                    Movies
                </div>
            </div>
        </div>

        <!-- Card 4 -->
        <div class="play-item">
            <div class="play-card card-green">
                <div class="play-icon">
                    ⚽
                </div>

                <div class="play-title">
                    Sports
                </div>
            </div>
        </div>

        <!-- Card 5 -->
        <div class="play-item">
            <div class="play-card card-pink">
                <div class="play-icon">
                    🎵
                </div>

                <div class="play-title">
                    Music
                </div>
            </div>
        </div>

        <!-- Card 6 -->
        <div class="play-item">
            <div class="play-card card-red">
                <div class="play-icon">
                    🌍
                </div>

                <div class="play-title">
                    Geography
                </div>
            </div>
        </div>

        <!-- Card 7 -->
        <div class="play-item">
            <div class="play-card card-cyan">
                <div class="play-icon">
                    🔬
                </div>

                <div class="play-title">
                    Science
                </div>
            </div>
        </div>

    </div>

</section>

<!-- =========================================================
END OF YOU MAY PLAY
SECTION 02
========================================================= -->
</body>

</html>

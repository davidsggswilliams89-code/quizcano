<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quizcano</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

    /* =========================================================
    SECTION 01
    BEGINNING OF HEADER CSS
    ========================================================= */

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins',sans-serif;
    }

    body{
        background:#0B1020;
        color:#ffffff;
    }

    .top-header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:18px;
    }

    .menu-btn{
        width:42px;
        height:42px;
        background:#1A2035;
        border-radius:12px;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:22px;
        cursor:pointer;
    }

    .logo-area{
        text-align:center;
        flex:1;
    }

    .logo-area h1{
        font-size:28px;
        font-weight:800;
        letter-spacing:1px;
    }

    .logo-area span{
        color:#FF9D00;
    }

    .logo-area p{
        font-size:12px;
        color:#8E98B8;
        margin-top:2px;
    }

    .right-icons{
        display:flex;
        align-items:center;
        gap:12px;
    }

    .notification{
        width:42px;
        height:42px;
        background:#1A2035;
        border-radius:12px;
        display:flex;
        justify-content:center;
        align-items:center;
        position:relative;
        font-size:18px;
    }

    .notification span{
        position:absolute;
        top:-4px;
        right:-4px;
        background:#FF3B30;
        width:18px;
        height:18px;
        border-radius:50%;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:10px;
        font-weight:bold;
    }

    .profile img{
        width:46px;
        height:46px;
        border-radius:50%;
        border:2px solid #FF9D00;
        object-fit:cover;
    }

/* =========================================================
SECTION 01
END OF HEADER CSS
========================================================= */

/* =========================================================
SECTION 02
BEGINNING OF YOU MAY PLAY CSS
========================================================= */

.section-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 18px 15px;
}

.section-header h2{
    font-size:24px;
    font-weight:700;
}

.section-header a{
    text-decoration:none;
    color:#FF9D00;
    font-size:14px;
    font-weight:600;
}

.play-scroll{
    display:flex;
    gap:14px;
    overflow-x:auto;
    padding:0 18px 10px;
    scroll-behavior:smooth;
    scrollbar-width:none;
}

.play-scroll::-webkit-scrollbar{
    display:none;
}

.play-card{
    min-width:150px;
    background:#171C2F;
    border-radius:22px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.06);
    transition:.35s;
    flex-shrink:0;
}

.play-card:hover{
    transform:translateY(-6px);
}

.play-image{
    height:110px;
    background:linear-gradient(135deg,#7C3AED,#2563EB);
    display:flex;
    align-items:center;
    justify-content:center;
}

.play-icon{
    width:42px;
    height:42px;
    border-radius:50%;
    background:rgba(255,255,255,.18);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
}

.play-info{
    padding:12px;
}

.play-info h3{
    font-size:16px;
    margin-bottom:4px;
}

.play-info p{
    color:#9CA3AF;
    font-size:13px;
}

/* =========================================================
END OF YOU MAY PLAY CSS
SECTION 02
========================================================= */ 

    </style>

</head>

<body>

<!-- =========================================================
SECTION 01
BEGINNING OF HEADER
========================================================= -->

<header class="top-header">

    <div class="menu-btn">
        ☰
    </div>

    <div class="logo-area">
        <h1>QUIZ<span>CANO</span></h1>
        <p>Play • Learn • Win</p>
    </div>

    <div class="right-icons">

        <div class="notification">
            🔔
            <span>3</span>
        </div>

        <div class="profile">
            <img src="https://i.pravatar.cc/100?img=12" alt="Profile">
        </div>

    </div>

</header>

<!-- =========================================================
SECTION 01
END OF HEADER  HTML
========================================================= -->

<!-- =========================================================
SECTION 02
BEGINNING OF YOU MAY PLAY. HTML
========================================================= -->

<div class="section-header">

<h2>You May Play</h2>

<a href="#">Explore →</a>

</div>

<div class="play-scroll">

<div class="play-card">

<div class="play-image">

<div class="play-icon">🧠</div>

</div>

<div class="play-info">

<h3>Brain Quiz</h3>

<p>250 Questions</p>

</div>

</div>

<div class="play-card">

<div class="play-image" style="background:linear-gradient(135deg,#FF8A00,#FF5F00);">

<div class="play-icon">🎮</div>

</div>

<div class="play-info">

<h3>Gaming</h3>

<p>420 Questions</p>

</div>

</div>

<div class="play-card">

<div class="play-image" style="background:linear-gradient(135deg,#10B981,#059669);">

<div class="play-icon">⚽</div>

</div>

<div class="play-info">

<h3>Sports</h3>

<p>180 Questions</p>

</div>

</div>

</div>

<!-- =========================================================
SECTION 02
END OF YOU MAY PLAY HTML
========================================================= -->    
</body>

</html>

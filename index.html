<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quizcano</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#060812;
    color:#fff;
}

/* ===========================
HEADER
=========================== */

.top-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px;
}

.menu-btn{
    font-size:30px;
    cursor:pointer;
}

.logo-area{
    text-align:center;
}

.logo-area h1{
    font-size:36px;
    font-weight:800;
    letter-spacing:1px;
}

.logo-area span{
    color:#ff9d00;
}

.logo-area p{
    font-size:15px;
    opacity:.7;
}

.right-icons{
    display:flex;
    align-items:center;
    gap:15px;
}

.notification{
    position:relative;
    font-size:28px;
}

.notification span{
    position:absolute;
    top:-8px;
    right:-8px;
    background:red;
    width:20px;
    height:20px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
}

.profile img{
    width:58px;
    height:58px;
    border-radius:50%;
    border:3px solid orange;
}

/* ===========================
YOU MAY LIKE
=========================== */

.section-title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 18px;
    margin-top:10px;
    margin-bottom:15px;
}

.section-title h2{
    font-size:30px;
    font-weight:700;
}

.section-title a{
    color:#ff9d00;
    text-decoration:none;
    font-size:15px;
}

.horizontal-scroll{
    display:flex;
    overflow-x:auto;
    gap:15px;
    padding:0 18px 10px;
    scrollbar-width:none;
}

.horizontal-scroll::-webkit-scrollbar{
    display:none;
}

.quiz-card{
    min-width:140px;
    background:#171c2f;
    border-radius:22px;
    overflow:hidden;
    flex-shrink:0;
    transition:.3s;
}

.quiz-card:hover{
    transform:translateY(-5px);
}

.quiz-card img{
    width:100%;
    height:120px;
    object-fit:cover;
}

.quiz-card h3{
    font-size:18px;
    padding:10px;
}

.quiz-card p{
    color:#999;
    font-size:14px;
    padding:0 10px 12px;
}
  
</style>

</head>

<body>

<!-- ===========================
QUIZCANO HEADER
=========================== -->

<header class="top-header">

    <div class="menu-btn">
        ☰
    </div>

    <div class="logo-area">
        <h1>QUIZ<span>CANO</span></h1>
        <p>Play. Learn. Win.</p>
    </div>

    <div class="right-icons">

        <div class="notification">
            🔔
            <span>3</span>
        </div>

        <div class="profile">
            <img src="https://i.pravatar.cc/100?img=12" alt="Profile">
        </div>

    </div>

</header>

<!-- ===========================
YOU MAY LIKE
=========================== -->

<div class="section-title">

<h2>You May Like</h2>

<a href="#">View all</a>

</div>

<div class="horizontal-scroll">

<div class="quiz-card">

<img src="https://picsum.photos/200/200?1">

<h3>General Knowledge</h3>

<p>250 Quizzes</p>

</div>

<div class="quiz-card">

<img src="https://picsum.photos/200/200?2">

<h3>Sports Trivia</h3>

<p>180 Quizzes</p>

</div>

<div class="quiz-card">

<img src="https://picsum.photos/200/200?3">

<h3>Movies & TV</h3>

<p>300 Quizzes</p>

</div>

<div class="quiz-card">

<img src="https://picsum.photos/200/200?4">

<h3>Gaming Quiz</h3>

<p>420 Quizzes</p>

</div>

<div class="quiz-card">

<img src="https://picsum.photos/200/200?5">

<h3>Music Quiz</h3>

<p>160 Quizzes</p>

</div>

</div>   

</body>
</html>

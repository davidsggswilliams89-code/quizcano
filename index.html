 <script>
/* =========================================================
SECTION 02
FEATURED CAROUSEL JS
========================================================= */

/* ===========================
Featured Banners
=========================== */

const featuredBanners = [

{
    image:"featurebanner1.png",
    link:"#"
},

{
    image:"featurebanner2.png",
    link:"#"
},

{
    image:"featurebanner3.png",
    link:"#"
},

{
    image:"featurebanner4.png",
    link:"#"
},

{
    image:"featurebanner5.png",
    link:"#"
},

{
    image:"featurebanner6.png",
    link:"#"
},

{
    image:"featurebanner7.png",
    link:"#"
},

{
    image:"featurebanner8.png",
    link:"#"
},

{
    image:"featurebanner9.png",
    link:"#"
}

];

/* ===========================
Load Carousel
=========================== */

const carouselSlides = document.getElementById("carouselSlides");

const dotsContainer = document.querySelector(".carousel-dots");

carouselSlides.innerHTML = "";

dotsContainer.innerHTML = "";

featuredBanners.forEach(function(banner,index){

    carouselSlides.innerHTML += `

    <a href="${banner.link}" class="carousel-slide">

        <img src="${banner.image}" alt="Featured Banner">

    </a>

    `;

    dotsContainer.innerHTML += `

    <span class="dot ${index===0 ? "active" : ""}"></span>

    `;

});

/* ===========================
Carousel Variables
=========================== */

let currentSlide = 0;

const dots = document.querySelectorAll(".dot");

/* ===========================
Show Slide
=========================== */

function showSlide(index){

    carouselSlides.style.transform =
    "translateX(-"+(index*100)+"%)";

    dots.forEach(function(dot){

        dot.classList.remove("active");

    });

    dots[index].classList.add("active");

}

/* ===========================
Next Slide
=========================== */

function nextSlide(){

    currentSlide++;

    if(currentSlide >= featuredBanners.length){

        currentSlide = 0;

    }

    showSlide(currentSlide);

}

/* ===========================
Previous Slide
=========================== */

function previousSlide(){

    currentSlide--;

    if(currentSlide < 0){

        currentSlide = featuredBanners.length - 1;

    }

    showSlide(currentSlide);

}

/* ===========================
Dot Click
=========================== */

dots.forEach(function(dot,index){

    dot.addEventListener("click",function(){

        currentSlide = index;

        showSlide(currentSlide);

    });

});

/* ===========================
Auto Play
=========================== */

setInterval(nextSlide,5000);

/* =========================================================
END OF SECTION 02  JAVA
========================================================= */

</script>

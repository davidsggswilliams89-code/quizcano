}

.menu-btn{

=========================== */

.header-right{

    display:flex;

    align-items:center;

=========================== */

.notification-btn{

    width:48px;

    height:48px;

    border:none;

    border-radius:14px;

    background:#1A2138;

    font-size:22px;

    position:relative;

    cursor:pointer;

}

.notification-count{

    position:absolute;

    top:-4px;

    right:-4px;

    width:18px;

    height:18px;

    background:#FF3B30;

    color:#FFFFFF;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:10px;

    font-weight:bold;

}

/* ===========================
Brain Icon
=========================== */

.profile-image{

    width:48px;

    height:48px;

    border-radius:50%;

    border:3px solid #F59E0B;

    background:#1A2138;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:24px;

    cursor:pointer;

}

        </h1>

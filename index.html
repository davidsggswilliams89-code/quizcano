<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quizcano</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

    /* =========================================================
    SECTION 01
    BEGINNING OF HEADER CSS
    ========================================================= */

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins',sans-serif;
    }

    body{
        background:#0B1020;
        color:#ffffff;
    }

    .top-header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:18px;
    }

    .menu-btn{
        width:42px;
        height:42px;
        background:#1A2035;
        border-radius:12px;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:22px;
        cursor:pointer;
    }

    .logo-area{
        text-align:center;
        flex:1;
    }

    .logo-area h1{
        font-size:28px;
        font-weight:800;
        letter-spacing:1px;
    }

    .logo-area span{
        color:#FF9D00;
    }

    .logo-area p{
        font-size:12px;
        color:#8E98B8;
        margin-top:2px;
    }

    .right-icons{
        display:flex;
        align-items:center;
        gap:12px;
    }

    .notification{
        width:42px;
        height:42px;
        background:#1A2035;
        border-radius:12px;
        display:flex;
        justify-content:center;
        align-items:center;
        position:relative;
        font-size:18px;
    }

    .notification span{
        position:absolute;
        top:-4px;
        right:-4px;
        background:#FF3B30;
        width:18px;
        height:18px;
        border-radius:50%;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:10px;
        font-weight:bold;
    }

    .profile img{
        width:46px;
        height:46px;
        border-radius:50%;
        border:2px solid #FF9D00;
        object-fit:cover;
    }

/* =========================================================
SECTION 01
END OF HEADER CSS
========================================================= */

/* =========================================================
SECTION 02
BEGINNING OF YOU MAY PLAY CSS
========================================================= */

.section-header{
    padding:18px;
}

.section-header h2{
    font-size:20px;
    font-weight:700;
}

.play-scroll{
    display:flex;
    overflow-x:auto;
    gap:16px;
    padding:0 18px 10px;
    scrollbar-width:none;
}

.play-scroll::-webkit-scrollbar{
    display:none;
}

.play-item{
    width:75px;
}

.play-item img{
    width:75px;
    height:75px;
    border-radius:16px;
}

.play-item img{
    width:100px;
    height:100px;
    border-radius:20px;
    object-fit:cover;
    display:block;
}

.play-title{
    margin-top:10px;
    font-size:15px;
    color:#fff;
    text-align:center;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

/* =========================================================
END OF YOU MAY PLAY CSS
SECTION 02
========================================================= */ 

    </style>

</head>

<body>

<!-- =========================================================
SECTION 01
BEGINNING OF HEADER
========================================================= -->

<header class="top-header">

    <div class="menu-btn">
        ☰
    </div>

    <div class="logo-area">
        <h1>QUIZ<span>CANO</span></h1>
        <p>Play • Learn • Win</p>
    </div>

    <div class="right-icons">

        <div class="notification">
            🔔
            <span>3</span>
        </div>

        <div class="profile">
            <img src="https://i.pravatar.cc/100?img=12" alt="Profile">
        </div>

    </div>

</header>

<!-- =========================================================
SECTION 01
END OF HEADER  HTML
========================================================= -->

<!-- ===============================
SECTION 02
BEGINNING OF YOU MAY PLAY
===================================== -->

<div class="section-header">
    <h2>You May Play</h2>
</div>

<div class="play-scroll">

<div class="play-item">
<img src="https://picsum.photos/200?1">
<div class="play-title">Brain Quiz</div>
</div>

<div class="play-item">
<img src="https://picsum.photos/200?2">
<div class="play-title">Sports Quiz</div>
</div>

<div class="play-item">
<img src="https://picsum.photos/200?3">
<div class="play-title">Movie Quiz</div>
</div>

<div class="play-item">
<img src="https://picsum.photos/200?4">
<div class="play-title">History</div>
</div>

<div class="play-item">
<img src="https://picsum.photos/200?5">
<div class="play-title">Science</div>
</div>

</div>

<!-- =======================================
END OF YOU MAY PLAY
SECTION 02
========================================= -->    
</body>

</html>

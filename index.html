<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quizcano</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

    /* =========================================================
    SECTION 01
    BEGINNING OF HEADER CSS
    ========================================================= */

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins',sans-serif;
    }

    body{
        background:#0B1020;
        color:#ffffff;
    }

    .top-header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:18px;
    }

    .menu-btn{
        width:42px;
        height:42px;
        background:#1A2035;
        border-radius:12px;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:22px;
        cursor:pointer;
    }

    .logo-area{
        text-align:center;
        flex:1;
    }

    .logo-area h1{
        font-size:28px;
        font-weight:800;
        letter-spacing:1px;
    }

    .logo-area span{
        color:#FF9D00;
    }

    .logo-area p{
        font-size:12px;
        color:#8E98B8;
        margin-top:2px;
    }

    .right-icons{
        display:flex;
        align-items:center;
        gap:12px;
    }

    .notification{
        width:42px;
        height:42px;
        background:#1A2035;
        border-radius:12px;
        display:flex;
        justify-content:center;
        align-items:center;
        position:relative;
        font-size:18px;
    }

    .notification span{
        position:absolute;
        top:-4px;
        right:-4px;
        background:#FF3B30;
        width:18px;
        height:18px;
        border-radius:50%;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:10px;
        font-weight:bold;
    }

    .profile img{
        width:46px;
        height:46px;
        border-radius:50%;
        border:2px solid #FF9D00;
        object-fit:cover;
    }

/* =========================================================
SECTION 01
END OF HEADER CSS
========================================================= */

/* =========================================================
SECTION 02
BEGINNING OF YOU MAY PLAY CSS
========================================================= */

.you-may-play{
    margin-top:16px;
}

.section-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 18px 12px;
}

.section-header h2{
    font-size:14px;
    font-weight:700;
    color:#FFFFFF;
}

.section-header a{
    text-decoration:none;
    color:#FFA64D;
    font-size:12px;
    font-weight:600;
}

.play-scroll{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding:0 18px 8px;
    scroll-behavior:smooth;
    scrollbar-width:none;
}

.play-scroll::-webkit-scrollbar{
    display:none;
}

.play-item{
    flex-shrink:0;
}

/* Quiz Card */

.play-card{

    width:60px;
    height:60px;

    border-radius:10px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:2px;

    overflow:hidden;

    border:1px solid rgba(255,255,255,.08);

    box-shadow:0 4px 10px rgba(0,0,0,.28);

    transition:.25s;

}

.play-card:hover{

    transform:translateY(-2px);

}

/* Quiz Image */

.play-image{

    width:68px;
    height:68px;

    object-fit:contain;

    margin-bottom:2px;

}

/* Quiz Title */

.play-title{

    color:#FFFFFF;

    font-size:9px;

    font-weight:600;

    text-align:center;

    line-height:11px;

    max-width:58px;

}

/* Card Colors */

.card-purple{

    background:linear-gradient(180deg,#8B5CF6,#5B21B6);

}

.card-orange{

    background:linear-gradient(180deg,#FF9A3D,#FF6A00);

}

.card-blue{

    background:linear-gradient(180deg,#3B82F6,#1D4ED8);

}

.card-green{

    background:linear-gradient(180deg,#22C55E,#15803D);

}

.card-pink{

    background:linear-gradient(180deg,#EC4899,#BE185D);

}

.card-red{

    background:linear-gradient(180deg,#EF4444,#B91C1C);

}

.card-cyan{

    background:linear-gradient(180deg,#06B6D4,#0F766E);

}

/* =========================================================
END OF YOU MAY PLAY CSS
SECTION 02
========================================================= */

/* =========================================================
SECTION 03
BEGINNING OF FEATURED BANNER CSS
========================================================= */

.featured-banner{

    width:100%;

    padding:16px 18px 10px;

}

.featured-banner a{

    display:block;

}

.featured-image{

    width:100%;

    display:block;

    border-radius:20px;

    object-fit:cover;

    cursor:pointer;

    box-shadow:0 8px 20px rgba(0,0,0,.35);

    transition:.3s;

}

.featured-image:hover{

    transform:scale(1.02);

}

/* =========================================================
END OF FEATURED BANNER CSS
SECTION 03
========================================================= */
       
    </style>

</head>

<body>

<!-- =========================================================
SECTION 01
BEGINNING OF HEADER
========================================================= -->

<header class="top-header">

    <div class="menu-btn">
        ☰
    </div>

    <div class="logo-area">
        <h1>QUIZ<span>CANO</span></h1>
        <p>Play • Learn • Win</p>
    </div>

    <div class="right-icons">

        <div class="notification">
            🔔
            <span>3</span>
        </div>

        <div class="profile">
            <img src="https://i.pravatar.cc/100?img=12" alt="Profile">
        </div>

    </div>

</header>

<!-- =========================================================
SECTION 01
END OF HEADER  HTML
========================================================= -->

<!-- =========================================================
SECTION 02
BEGINNING OF YOU MAY PLAY
========================================================= -->

<section class="you-may-play">

    <div class="section-header">
        <h2>You May Play</h2>
        <a href="#">View All</a>
    </div>

    <div class="play-scroll">

        <div class="play-item">
            <div class="play-card card-purple">
                <img src="General.png" alt="Brain Quiz" class="play-image">
            </div>
        </div>

        <div class="play-item">
            <div class="play-card card-orange">
                <img src="game.png" alt="Gaming" class="play-image">
            </div>
        </div>

        <div class="play-item">
            <div class="play-card card-blue">
                <img src="movies.png" alt="Movies" class="play-image">
            </div>
        </div>

        <div class="play-item">
            <div class="play-card card-green">
                <img src="sport.png" alt="Sports" class="play-image">
            </div>
        </div>

        <div class="play-item">
            <div class="play-card card-pink">
                <img src="music.png" alt="Music" class="play-image">
            </div>
        </div>

    </div>

</section>

<!-- =========================================================
END OF YOU MAY PLAY
SECTION 02
========================================================= -->

<!-- =========================================================
SECTION 03
BEGINNING OF FEATURED BANNER
========================================================= -->

<section class="featured-banner">

    <a href="#play-game">

        <img src="featurebanner.png"
             alt="Featured Quiz Banner"
             class="featured-image">

    </a>

</section>

<!-- =========================================================
END OF FEATURED BANNER
SECTION 03
========================================================= -->


    
</body>

</html>

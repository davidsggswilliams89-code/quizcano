/* =========================================================
SECTION 01
QUIZCANO HEADER CSS
========================================================= */

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

body{

    background:#0B1120;

    font-family:Arial,Helvetica,sans-serif;

    color:#FFFFFF;

}

/* ===========================
Top Header
=========================== */

.top-header{

    width:100%;

    height:82px;

    background:#0B1120;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:10px 14px;

    position:sticky;

    top:0;

    z-index:1000;

}

/* ===========================
Menu Button
=========================== */

.menu-btn{

    width:48px;

    height:48px;

    border:3px solid #F59E0B;

    border-radius:50%;

    background:#1A2138;

    color:#FFFFFF;

    font-size:24px;

    display:flex;

    justify-content:center;

    align-items:center;

    cursor:pointer;

    flex-shrink:0;

}

/* ===========================
Logo Area
=========================== */

.logo-area{

    flex:1;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

    text-align:center;

}

/* ===========================
Logo
=========================== */

.logo{

    font-size:34px;

    font-weight:900;

    letter-spacing:1px;

    cursor:pointer;

    user-select:none;

}

.logo-white{

    color:#FFFFFF;

}

.logo-orange{

    color:#F59E0B;

}

.logo-tagline{

    margin-top:3px;

    font-size:11px;

    color:#8B93A7;

}

/* ===========================
Right Side
=========================== */

.header-right{

    width:48px;

    display:flex;

    justify-content:flex-end;

    align-items:center;

    flex-shrink:0;

}

/* ===========================
Brain Profile Icon
=========================== */

.profile-image{

    width:48px;

    height:48px;

    border-radius:50%;

    background:#1A2138;

    border:3px solid #F59E0B;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:22px;

    cursor:pointer;

}

/* =========================================================
END OF SECTION 01 CSS
========================================================= */
/* =========================================================
SECTION 02
FEATURED CAROUSEL CSS
========================================================= */

/* ===========================
Featured Carousel
=========================== */

.featured-carousel{

    width:100%;

    padding:6px 8px 10px;

}

/* ===========================
Section Title
=========================== */

.featured-title{

    display:flex;

    align-items:center;

    gap:8px;

    margin-left:4px;

    margin-bottom:10px;

    font-size:16px;

    font-weight:900;

    color:#FFFFFF;

    letter-spacing:1px;

    text-transform:uppercase;

    text-shadow:0 2px 8px rgba(0,0,0,.35);

}

/* ===========================
Emoji
=========================== */

.featured-title::before{

    content:"🔥";

    font-size:16px;

}

/* ===========================
Carousel Container
=========================== */

.carousel-container{

    width:100%;

    overflow:hidden;

    border-radius:20px;

}

/* ===========================
Carousel Track
=========================== */

.carousel-track{

    display:flex;

    transition:transform .6s ease;

    will-change:transform;

}

/* ===========================
Carousel Item
=========================== */

.carousel-item{

    flex:0 0 100%;

    width:100%;

    padding:2px;

}

/* ===========================
Banner Image
=========================== */

.carousel-item img{

    width:100%;

    display:block;

    object-fit:contain;

    border-radius:20px;

}

/* ===========================
Carousel Dots
=========================== */

.carousel-dots{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:6px;

    margin-top:8px;

}

/* ===========================
Dot
=========================== */

.dot{

    width:8px;

    height:8px;

    border-radius:50%;

    background:#4B5563;

    transition:.3s;

    cursor:pointer;

}

/* ===========================
Active Dot
=========================== */

.dot.active{

    width:20px;

    height:8px;

    border-radius:20px;

    background:#F59E0B;

}

/* =========================================================
END OF SECTION 02 CSS
========================================================= */
/* =========================================================
SECTION 03
QUIZ CATEGORY SCROLLER CSS
========================================================= */

/* ===========================
Category Section
=========================== */

.category-section{

    width:100%;

    padding:16px 15px 20px;

}

/* ===========================
Header
=========================== */

.category-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:10px;

}

/* ===========================
Section Title
=========================== */

.category-title{

    font-size:14px;

    font-weight:400;

    color:#FFFFFF;

    letter-spacing:.3px;

}

/* ===========================
View All Button
=========================== */

.view-all{

    text-decoration:none;

    color:#F59E0B;

    font-size:14px;

    font-weight:700;

    transition:.3s;

}

.view-all:hover{

    color:#FFD166;

}

/* ===========================
/* ===========================
Horizontal Scroll
=========================== */

.category-scroll{

    display:flex;

    gap:14px;

    overflow-x:auto;

    overflow-y:hidden;

    scroll-behavior:smooth;

    -webkit-overflow-scrolling:touch;

    scrollbar-width:none;

    padding:5px;

}

/* Hide Scrollbar */

.category-scroll::-webkit-scrollbar{

    display:none;

}

/* ===========================
Active Category
=========================== */

.category-card.active{

    border:2px solid #F59E0B;

}

/* ===========================
Hover Effect
=========================== */

.category-card:hover{

    transform:scale(1.05);

}

/* ===========================
Category Card
=========================== */

.category-card{

    flex:0 0 72px;

    width:72px;

    height:72px;

    padding:2px;

    border-radius:16px;

    border:1px solid rgba(255,255,255,.12);

    background:#1A2138;

    overflow:hidden;

    display:flex;

    justify-content:center;

    align-items:center;

    cursor:pointer;

    transition:all .25s ease;

    box-sizing:border-box;

}
/* ===========================
Category Image
=========================== */

.category-card img{

    width:110%;

    height:110%;

    display:block;

    object-fit:cover;

    user-select:none;

    pointer-events:none;

}

/* =========================================================
END OF SECTION 03 CSS
========================================================= */
/* =========================================================
SECTION 04
QUIZ BANNER LIST CSS
========================================================= */

/* ===========================
Quiz List Section
=========================== */

.quiz-list-section{

Header
=========================== */

Section Title
=========================== */

    color:#FFFFFF;

    letter-spacing:.3px;

}

/* ===========================
Quiz Banner List
=========================== */

.quiz-banner-list{

    display:flex;

    flex-direction:column;

    gap:10px;

}
/* ===========================
Banner Card
=========================== */

.quiz-banner-card{

    display:block;

    width:100%;

    height:70px;

    overflow:hidden;

    border-radius:6px;

    background:#111827;

    text-decoration:none;

    transition:transform .25s ease;

    box-shadow:0 4px 12px rgba(0,0,0,.25);

}

/* ===========================
Banner Hover
=========================== */

.quiz-banner-card:hover{

    transform:translateY(-2px);

}

/* ===========================
Banner Image
=========================== */

.quiz-banner-card img{

    width:100%;

    height:100%;

    display:block;

    object-fit:cover;

    border-radius:24px;

    user-select:none;

    -webkit-user-drag:none;

}

/* ===========================
Banner Active
=========================== */

.quiz-banner-card:active{

    transform:scale(.98);

}

/* =========================================================
END OF SECTION 04 CSS
========================================================= */




</style>

 <script>

/* =========================================================
SECTION 02
FEATURED CAROUSEL JAVASCRIPT
========================================================= */

/* ===========================
Variables
=========================== */

const track = document.getElementById("carouselTrack");

const slides = document.querySelectorAll(".carousel-item");

const dots = document.querySelectorAll(".dot");

let currentSlide = 0;

const totalSlides = slides.length;

/* ===========================
Show Slide
=========================== */

function showSlide(index){

    track.style.transform =
    "translateX(-" + (index * 100) + "%)";

    dots.forEach(function(dot){

        dot.classList.remove("active");

    });

    dots[index].classList.add("active");

}

/* ===========================
Next Slide
=========================== */

function nextSlide(){

    currentSlide++;

    if(currentSlide >= totalSlides){

        currentSlide = 0;

    }

    showSlide(currentSlide);

}

/* ===========================
Previous Slide
=========================== */

function previousSlide(){

    currentSlide--;

    if(currentSlide < 0){

        currentSlide = totalSlides - 1;

    }

    showSlide(currentSlide);

}

/* ===========================
Dot Navigation
=========================== */

dots.forEach(function(dot,index){

    dot.addEventListener("click",function(){

        currentSlide = index;

        showSlide(currentSlide);

    });

});

/* ===========================
Auto Slide
=========================== */

setInterval(function(){

    nextSlide();

},5000);

/* ===========================
Start
=========================== */

showSlide(0);

/* =========================================================
END OF SECTION 02 JAVA SCRIPT JAVA JAVA JAVA
========================================================= */
/* =========================================================
SECTION 03
QUIZ CATEGORY SCROLLER JAVASCRIPT

/* ===========================
Variables
=========================== */

const categoryCards =
document.querySelectorAll(".category-card");

/* ===========================
Category Click
=========================== */

categoryCards.forEach(function(card){

    card.addEventListener("click",function(){

        /* Remove Active */

        categoryCards.forEach(function(item){

            item.classList.remove("active");

        });

        /* Active Current */

        this.classList.add("active");

        /* Get Category */

        const selectedCategory =
        this.getAttribute("data-category");

        /* Show Section 04 */

        loadCategory(selectedCategory);

    });

});

/* ===========================
Load Category
=========================== */

function loadCategory(category){

    /*
    SECTION 04 WILL USE THIS VALUE.

    Example values:

    general
    sports
    movies
    science
    history
    music
    technology
    animals
    geography
    football

    */

    console.log("Selected Category:",category);

}

/* ===========================
Default Category
=========================== */

if(categoryCards.length>0){

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QUIZCANO</title>

<style>
    
/* =========================================================
SECTION 01
QUIZCANO HEADER CSS
========================================================= */

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

body{

    background:#0B1120;

    font-family:Arial,Helvetica,sans-serif;

    color:#FFFFFF;

}

/* ===========================
Top Header
=========================== */

.top-header{

    width:100%;

    height:82px;

    background:#0B1120;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:10px 14px;

    position:sticky;

    top:0;

    z-index:1000;

}

/* ===========================
Menu Button
=========================== */

.menu-btn{

    width:48px;

    height:48px;

    border:none;

    border-radius:50%;

    background:#1A2138;

    color:#FFFFFF;

    font-size:24px;

    display:flex;

    justify-content:center;

    align-items:center;

    cursor:pointer;

    flex-shrink:0;

}

/* ===========================
Logo Area
=========================== */

.logo-area{

    flex:1;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

    text-align:center;

}

/* ===========================
Logo
=========================== */

.logo{

    font-size:34px;

    font-weight:900;

    letter-spacing:1px;

    cursor:pointer;

    user-select:none;

}

.logo-white{

    color:#FFFFFF;

}

.logo-orange{

    color:#F59E0B;

}

.logo-tagline{

    margin-top:3px;

    font-size:11px;

    color:#8B93A7;

}

/* ===========================
Right Side
=========================== */

.header-right{

    width:48px;

    display:flex;

    justify-content:flex-end;

    align-items:center;

    flex-shrink:0;

}

/* ===========================
Brain Profile Icon
=========================== */

.profile-image{

    width:48px;

    height:48px;

    border-radius:50%;

    background:#1A2138;

    border:3px solid #F59E0B;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:22px;

    cursor:pointer;

}

/* =========================================================
END OF SECTION 01 CSS
========================================================= */
/* =========================================================
SECTION 02
FEATURED CAROUSEL CSS
========================================================= */

/* ===========================
Featured Carousel
=========================== */

.featured-carousel{

    width:100%;

    padding:6px 8px 10px;

}

/* ===========================
Carousel Container
=========================== */

.carousel-container{

    width:100%;

    overflow:hidden;

    border-radius:20px;

    position:relative;

}

/* ===========================
Banner Label
=========================== */

.carousel-label{

    position:absolute;

    top:14px;

    left:14px;

    background:rgba(0,0,0,.70);

    color:#FFFFFF;

    padding:8px 14px;

    border-radius:30px;

    font-size:12px;

    font-weight:700;

    letter-spacing:1px;

    text-transform:uppercase;

    z-index:10;

}

/* ===========================
Carousel Track
=========================== */

.carousel-track{

    display:flex;

    transition:transform .6s ease;

    will-change:transform;

}

/* ===========================
Carousel Item
=========================== */

.carousel-item{

    flex:0 0 100%;

    width:100%;

    padding:2px;

}

/* ===========================
Banner Image
=========================== */

.carousel-item img{

    width:100%;

    display:block;

    object-fit:contain;

    border-radius:20px;

}

/* ===========================
Carousel Dots
=========================== */

.carousel-dots{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:6px;

    margin-top:8px;

}

/* ===========================
Dot
=========================== */

.dot{

    width:8px;

    height:8px;

    border-radius:50%;

    background:#4B5563;

    transition:.3s;

    cursor:pointer;

}

/* ===========================
Active Dot
=========================== */

.dot.active{

    width:20px;

    height:8px;

    border-radius:20px;

    background:#F59E0B;

}

/* =========================================================
END OF SECTION 02 CSS
========================================================= */
    
</style>

</head>

<body>
    
<!-- =========================================================
SECTION 01
QUIZCANO HEADER HTM HTML HTML HTML HTML HTML
========================================================= -->

<header class="top-header">

    <!-- Left Menu -->
    <button class="menu-btn" id="menuBtn">
        ☰
    </button>

    <!-- Center Logo -->
    <div class="logo-area">

        <h1 class="logo" id="gameIcon">

            <span class="logo-white">QUIZ</span><span class="logo-orange">CANO</span>

        </h1>

        <p class="logo-tagline">

            Play • Learn • Win

        </p>

    </div>

    <!-- Right Side -->
    <div class="header-right">

        <div class="profile-image">

            🧠

        </div>

    </div>

</header>

<!-- =========================================================
END OF SECTION 01  HTML HTML HTML
========================================================= -->
<!-- =========================================================
SECTION 02
FEATURED CAROUSEL
========================================================= -->

<section class="featured-carousel">

    <div class="carousel-container">

        <!-- Banner Label -->
        <div class="carousel-label">
            DAILY CHALLENGE
        </div>

        <div class="carousel-track" id="carouselTrack">

            <div class="carousel-item">
                <img src="featurebanner1.png" alt="Banner 1">
            </div>

            <div class="carousel-item">
                <img src="featurebanner2.png" alt="Banner 2">
            </div>

            <div class="carousel-item">
                <img src="featurebanner3.png" alt="Banner 3">
            </div>

            <div class="carousel-item">
                <img src="featurebanner4.png" alt="Banner 4">
            </div>

            <div class="carousel-item">
                <img src="featurebanner5.png" alt="Banner 5">
            </div>

            <div class="carousel-item">
                <img src="featurebanner6.png" alt="Banner 6">
            </div>

            <div class="carousel-item">
                <img src="featurebanner7.png" alt="Banner 7">
            </div>

            <div class="carousel-item">
                <img src="featurebanner8.png" alt="Banner 8">
            </div>

            <div class="carousel-item">
                <img src="featurebanner9.png" alt="Banner 9">
            </div>

        </div>

    </div>

    <div class="carousel-dots">

        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>

    </div>

</section>

<!-- =========================================================
END OF SECTION 02 HTML
========================================================= -->
    
 <script>

/* =========================================================
SECTION 02
FEATURED CAROUSEL JAVASCRIPT
========================================================= */

/* ===========================
Variables
=========================== */

const track = document.getElementById("carouselTrack");

const slides = document.querySelectorAll(".carousel-item");

const dots = document.querySelectorAll(".dot");

let currentSlide = 0;

const totalSlides = slides.length;

/* ===========================
Show Slide
=========================== */

function showSlide(index){

    track.style.transform =
    "translateX(-" + (index * 100) + "%)";

    dots.forEach(function(dot){

        dot.classList.remove("active");

    });

    dots[index].classList.add("active");

}

/* ===========================
Next Slide
=========================== */

function nextSlide(){

    currentSlide++;

    if(currentSlide >= totalSlides){

        currentSlide = 0;

    }

    showSlide(currentSlide);

}

/* ===========================
Previous Slide
=========================== */

function previousSlide(){

    currentSlide--;

    if(currentSlide < 0){

        currentSlide = totalSlides - 1;

    }

    showSlide(currentSlide);

}

/* ===========================
Dot Navigation
=========================== */

dots.forEach(function(dot,index){

    dot.addEventListener("click",function(){

        currentSlide = index;

        showSlide(currentSlide);

    });

});

/* ===========================
Auto Slide
=========================== */

setInterval(function(){

    nextSlide();

},5000);

/* ===========================
Start
=========================== */

showSlide(0);

/* =========================================================
END OF SECTION 02 JAVA SCRIPT JAVA JAVA JAVA
========================================================= */

 </script>

</body>

</html>

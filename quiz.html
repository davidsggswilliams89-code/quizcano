<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QUIZCANO - Quiz</title>

</head>
<style>
/* =========================================================
SECTION 01
QUIZ PAGE CSS
========================================================= */

/* ===========================
Reset
=========================== */

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

body{

    background:#0B1120;

    font-family:Arial,Helvetica,sans-serif;

    color:#FFFFFF;

}

/* ===========================
Quiz Header
=========================== */

.quiz-header{

    width:100%;

    height:82px;

    background:#0B1120;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:10px 15px;

    position:sticky;

    top:0;

    z-index:1000;

}

/* ===========================
Back Button
=========================== */

.back-button{

    width:48px;

    height:48px;

    border:none;

    border-radius:50%;

    background:#1A2138;

    color:#FFFFFF;

    font-size:24px;

    font-weight:700;

    display:flex;

    justify-content:center;

    align-items:center;

    cursor:pointer;

    transition:.25s;

}

.back-button:hover{

    background:#232C48;

}

.back-button:active{

    transform:scale(.95);

}

/* ===========================
Logo Area
=========================== */

.logo-area{

    flex:1;

    text-align:center;

}

/* ===========================
Logo
=========================== */

.logo{

    font-size:32px;

    font-weight:900;

    letter-spacing:1px;

    line-height:1;

}

.logo span:first-child{

    color:#FFFFFF;

}

.logo span:last-child{

    color:#F59E0B;

}

/* ===========================
Tagline
=========================== */

.logo-area p{

    margin-top:4px;

    font-size:11px;

    color:#8B93A7;

}

/* ===========================
Question Counter
=========================== */

.question-counter{

    min-width:58px;

    height:48px;

    padding:0 12px;

    border-radius:24px;

    background:#1A2138;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:4px;

    font-size:18px;

    font-weight:800;

    color:#FFFFFF;

}

/* ===========================
Progress Section
=========================== */

.progress-section{

    width:100%;

    padding:12px 15px 20px;

}

/* ===========================
Progress Header
=========================== */

.progress-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:12px;

}

.progress-header h2{

    font-size:15px;

    font-weight:700;

    color:#FFFFFF;

}

/* ===========================
Timer
=========================== */

.timer{

    display:flex;

    align-items:center;

    gap:4px;

    padding:8px 14px;

    background:#1A2138;

    border-radius:50px;

    font-size:15px;

    font-weight:800;

    color:#F59E0B;

}

#timer{

    color:#FFFFFF;

}

/* ===========================
Progress Bar
=========================== */

.progress-bar{

    width:100%;

    height:12px;

    background:#1A2138;

    border-radius:50px;

    overflow:hidden;

}

#progressFill{

    width:5%;

    height:100%;

    background:linear-gradient(

        90deg,

        #F59E0B,

        #FFD166

    );

    border-radius:50px;

}

/* ===========================
Question Section
=========================== */

.question-section{

    width:100%;

    padding:0 15px 10px;

}

/* ===========================
Question Card
=========================== */

.question-card{

    width:100%;

    background:#111827;

    border-radius:5px;

    overflow:hidden;

}

/* ===========================
Question Title
=========================== */

.question-title{

    padding:14px 18px;

    font-size:16px;

    font-weight:800;

    background:#1A2138;

}

/* ===========================
Question Image
=========================== */

#questionImage{

    width:100%;

    height:320px;

    object-fit:cover;

    display:block;

    background:#0F172A;

}

/* ===========================
Question Text
=========================== */

#questionText{

    padding:20px;

    font-size:28px;

    font-weight:800;

    color:#FFFFFF;

}

/* ===========================
Answer Section
=========================== */

.answer-section{

    width:70%;

    margin:0 auto;

    padding:8px 0 20px;

    display:flex;

    justify-content:space-between;

}

/* ===========================
Answer Button
=========================== */

.answer-button{

    width:52px;

    height:52px;

    border:none;

    border-radius:50%;

    background:#1A2138;

    color:#FFFFFF;

    font-size:18px;

    font-weight:700;

    cursor:pointer;

    transition:.25s;

}

.answer-button:hover{

    background:#232C48;

}

/* ===========================
Next Section
=========================== */

.next-section{

    width:100%;

    padding:0 15px 20px;

}

/* ===========================
Next Button
=========================== */

#nextButton{

    width:100%;

    height:58px;

    border:none;

    border-radius:16px;

    background:#F59E0B;

    color:#FFFFFF;

    font-size:18px;

    font-weight:800;

    cursor:pointer;

}


    
</style>
<body>

<!-- =========================================================
SECTION 01
QUIZ PAGE HTML
========================================================= -->

<!-- ===========================
Quiz Header
=========================== -->

<header
class="quiz-header">

    <!-- Back Button -->

    <button
    id="backButton"
    class="back-button">

        ←

    </button>

    <!-- Logo -->

    <div
    class="logo-area">

        <h1
        class="logo">

            <span>QUIZ</span><span>CANO</span>

        </h1>

        <p>

            Play • Learn • Win

        </p>

    </div>

    <!-- Question Counter -->

    <div
    class="question-counter">

        <span
        id="currentQuestion">

            1

        </span>

        /

        <span
        id="totalQuestions">

            0

        </span>

    </div>

</header>

<!-- ===========================
Progress Section
=========================== -->

<section
class="progress-section">

    <div
    class="progress-header">

        <h2>

            Quiz Progress

        </h2>

        <div
        class="timer">

            ⏱️

            <span
            id="timer">

                20

            </span>

            s

        </div>

    </div>

    <div
    class="progress-bar">

        <div
        id="progressFill">

        </div>

    </div>

</section>

<!-- ===========================
Question Card
=========================== -->

<section
class="question-section">

    <div
    class="question-card">

        <div
        class="question-title">

            Question

        </div>

        <img

        id="questionImage"

        src=""

        alt="Question Image">

        <h2
        id="questionText">

            Loading Question...

        </h2>

    </div>

</section>

<!-- ===========================
Answer Section
=========================== -->

<section
class="answer-section">

    <button
    class="answer-button"
    data-answer="A">

        A

    </button>

    <button
    class="answer-button"
    data-answer="B">

        B

    </button>

    <button
    class="answer-button"
    data-answer="C">

        C

    </button>

    <button
    class="answer-button"
    data-answer="D">

        D

    </button>

</section>

<!-- ===========================
Next Button
=========================== -->

<section
class="next-section">

    <button
    id="nextButton">

        Next Question →

    </button>

</section>

<!-- =========================================================
END OF SECTION 01
========================================================= -->

    
<script type="module">
/* =========================================================
SECTION 02
FIREBASE & LOAD QUIZ
========================================================= */

    
import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

import {

    getFirestore,

    collection,

    query,

    where,

    getDocs

}
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

/* ===========================
Firebase Config
=========================== */

const firebaseConfig = {

    apiKey:"AIzaSyAnMxqDpdzgKEW1vkRSrLysT-0nu_vEf8Q",

    authDomain:"quizcano.firebaseapp.com",

    projectId:"quizcano",

    storageBucket:"quizcano.firebasestorage.app",

    messagingSenderId:"834135771491",

    appId:"1:834135771491:web:c9998944df72d14a7b2b56"

};

/* ===========================
Initialize Firebase
=========================== */

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* ===========================
Quiz Variables
=========================== */

let quizData = null;

let quizQuestions = [];

let currentQuestionIndex = 0;

/* ===========================
Read URL
=========================== */

const params =
new URLSearchParams(window.location.search);

const quizTitle =
params.get("quizTitle");

/* ===========================
Validate URL
=========================== */

if(!quizTitle){

    alert("Quiz not found.");

    throw new Error("Missing quizTitle");

}

/* ===========================
Load Quiz
=========================== */

async function loadQuiz(){

    try{

        const q =
        query(

            collection(db,"quizzes"),

            where(
                "quizTitle",
                "==",
                quizTitle
            )

        );

        const snapshot =
        await getDocs(q);

        if(snapshot.empty){

            alert("Quiz not found.");

            return;

        }

        snapshot.forEach((doc)=>{

            quizData =
            doc.data();
         
        });

        quizQuestions =
        quizData.questions || [];
        displayQuestion();

        console.log("Quiz Loaded");

        console.log(quizData);

        console.log(
            "Questions:",
            quizQuestions.length
        );

    }

    catch(error){

        console.error(error);

        alert(
            "Failed to load quiz."
        );

    }

}

/* ===========================
Start
=========================== */

loadQuiz();

/* =========================================================
END OF SECTION 02
========================================================= */

/* =========================================================
SECTION 03
DISPLAY FIRST QUESTION
========================================================= */

function displayQuestion(){

    if(quizQuestions.length===0){
        return;
    }

    const question = quizQuestions[currentQuestionIndex];

    document.getElementById("questionImage").src =
    question.questionImage || "";

    document.getElementById("questionText").textContent = "";

    document.getElementById("currentQuestion").textContent =
    currentQuestionIndex + 1;

    document.getElementById("totalQuestions").textContent =
    quizQuestions.length;

    const buttons =
    document.querySelectorAll(".answer-button");

    buttons[0].textContent = question.options.A;
    buttons[1].textContent = question.options.B;
    buttons[2].textContent = question.options.C;
    buttons[3].textContent = question.options.D;

}

/* =========================================================
END OF SECTION 03
========================================================= */
    
    
</script>
</body>

</html>

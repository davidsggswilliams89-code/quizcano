<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QUIZCANO - Quiz</title>

<style>

/* =========================================================
SECTION 01
QUIZ PAGE HEADER CSS
========================================================= */

/* ===========================
Reset
=========================== */

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

body{

    background:#0B1120;

    font-family:Arial,Helvetica,sans-serif;

    color:#FFFFFF;

}

/* ===========================
Quiz Header
=========================== */

.quiz-header{

    width:100%;

    height:82px;

    background:#0B1120;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:10px 15px;

    position:sticky;

    top:0;

    z-index:1000;

}

/* ===========================
Back Button
=========================== */

.quiz-back-btn{

    width:48px;

    height:48px;

    border:none;

    border-radius:50%;

    background:#1A2138;

    color:#FFFFFF;

    font-size:24px;

    font-weight:700;

    display:flex;

    justify-content:center;

    align-items:center;

    cursor:pointer;

    transition:.25s;

}

.quiz-back-btn:hover{

    background:#232C48;

}

.quiz-back-btn:active{

    transform:scale(.95);

}

/* ===========================
Logo Area
=========================== */

.quiz-logo-area{

    flex:1;

    text-align:center;

}

/* ===========================
Logo
=========================== */

.quiz-logo{

    font-size:32px;

    font-weight:900;

    letter-spacing:1px;

    line-height:1;

}

/* ===========================
Logo Colors
=========================== */

.logo-white{

    color:#FFFFFF;

}

.logo-orange{

    color:#F59E0B;

}

/* ===========================
Tagline
=========================== */

.quiz-tagline{

    margin-top:4px;

    font-size:11px;

    color:#8B93A7;

}

/* ===========================
Question Counter
=========================== */

.question-counter{

    min-width:58px;

    height:48px;

    padding:0 12px;

    border-radius:24px;

    background:#1A2138;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:4px;

    font-size:18px;

    font-weight:800;

    color:#FFFFFF;

}

/* ===========================
Counter Divider
=========================== */

.counter-divider{

    color:#F59E0B;

}

/* =========================================================
END OF SECTION 01 CSS
========================================================= */
/* =========================================================
SECTION 02
QUIZ PROGRESS & TIMER CSS
========================================================= */

/* ===========================
Quiz Progress Section
=========================== */

.quiz-progress-section{

    width:100%;

    padding:12px 15px 20px;

}

/* ===========================
Header
=========================== */

.progress-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:12px;

}

/* ===========================
Progress Title
=========================== */

.progress-title{

    font-size:15px;

    font-weight:700;

    color:#FFFFFF;

    letter-spacing:.3px;

}

/* ===========================
Timer
=========================== */

.timer-text{

    display:flex;

    align-items:center;

    gap:4px;

    padding:8px 14px;

    background:#1A2138;

    border-radius:50px;

    font-size:15px;

    font-weight:800;

    color:#F59E0B;

    box-shadow:0 4px 12px rgba(0,0,0,.25);

}

/* ===========================
Countdown Number
=========================== */

#countdownTimer{

    min-width:20px;

    text-align:center;

    font-size:18px;

    font-weight:900;

    color:#FFFFFF;

}

/* ===========================
Progress Bar Container
=========================== */

.progress-bar-container{

    width:100%;

    height:12px;

    background:#1A2138;

    border-radius:50px;

    overflow:hidden;

    box-shadow:inset 0 2px 5px rgba(0,0,0,.35);

}

/* ===========================
Progress Fill
=========================== */

.progress-bar-fill{

    width:5%;

    height:100%;

    background:linear-gradient(
        90deg,
        #F59E0B,
        #FFD166
    );

    border-radius:50px;

    transition:width .4s ease;

}

/* ===========================
Timer Warning
=========================== */

.timer-warning{

    color:#FF6B6B !important;

}

/* ===========================
Progress Animation
=========================== */

.progress-bar-fill.animate{

    transition:width .5s ease-in-out;

}

/* =========================================================
END OF SECTION 02 CSS
========================================================= */
/* =========================================================
SECTION 03
QUIZ QUESTION IMAGE CSS
========================================================= */

/* ===========================
Question Section
=========================== */

.question-section{

    width:100%;

    padding:0 15px 20px;

}

/* ===========================
Question Card
=========================== */

.question-card{

    width:100%;

    background:#111827;

    border-radius:24px;

    overflow:hidden;

    box-shadow:0 8px 20px rgba(0,0,0,.30);

}

/* ===========================
Question Label
=========================== */

.question-label{

    padding:14px 18px;

    font-size:16px;

    font-weight:800;

    color:#FFFFFF;

    background:#1A2138;

    border-bottom:1px solid rgba(255,255,255,.08);

}

/* ===========================
Question Image Container
=========================== */

.question-image-container{

    width:100%;

    height:320px;

    background:#0F172A;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

}

/* ===========================
Question Image
=========================== */

.question-image{

    width:100%;

    height:100%;

    display:block;

    object-fit:cover;

    user-select:none;

    pointer-events:none;

    -webkit-user-drag:none;

    transition:transform .35s ease;

}

/* ===========================
Image Hover
=========================== */

.question-card:hover .question-image{

    transform:scale(1.02);

}

/* ===========================
Loading State
=========================== */

.question-image.loading{

    opacity:.45;

}

/* =========================================================
END OF SECTION 03 CSS
========================================================= */
 /* =========================================================
SECTION 04
QUIZ ANSWER SELECTOR CSS
========================================================= */

/* ===========================
Answer Section
=========================== */

.answer-section{

    width:100%;

    padding:4px 8px 6px;

}

/* ===========================
Answer Container
=========================== */

.answer-container{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:10px;

}

/* ===========================
Answer Circle
=========================== */

.answer-circle{

    flex:1;

    width:48px;

    height:48px;

    max-width:48px;

    border:none;

    border-radius:50%;

    background:#1A2138;

    color:#FFFFFF;

    font-size:18px;

    font-weight:800;

    cursor:pointer;

    display:flex;

    justify-content:center;

    align-items:center;

    transition:all .25s ease;

    box-shadow:0 4px 10px rgba(0,0,0,.25);

}

/* ===========================
Hover
=========================== */

.answer-circle:hover{

    background:#232C48;

    transform:translateY(-2px);

}

/* ===========================
Pressed
=========================== */

.answer-circle:active{

    transform:scale(.95);

}

/* ===========================
Selected
=========================== */

.answer-circle.selected{

    background:#F59E0B;

    color:#FFFFFF;

    box-shadow:0 0 0 3px rgba(245,158,11,.35);

}

/* ===========================
Disabled
=========================== */

.answer-circle.disabled{

    pointer-events:none;

    opacity:.7;

}

/* =========================================================
END OF SECTION 04 CSS
========================================================= */  
/* =========================================================
SECTION 05
QUIZ NEXT BUTTON CSS
========================================================= */

/* ===========================
Next Section
=========================== */

.next-section{

    width:100%;

    padding:0 15px 20px;

    margin-top:8px;

}

/* ===========================
Next Button
=========================== */

.next-question-btn{

    width:100%;

    height:50px;

    border:none;

    border-radius:16px;

    background:#F59E0B;

    color:#FFFFFF;

    font-size:18px;

    font-weight:800;

    cursor:pointer;

    display:flex;

    justify-content:center;

    align-items:center;

    transition:all .25s ease;

    box-shadow:0 6px 18px rgba(245,158,11,.30);

}

/* ===========================
Hover
=========================== */

.next-question-btn:hover{

    transform:translateY(-2px);

    box-shadow:0 10px 24px rgba(245,158,11,.35);

}

/* ===========================
Pressed
=========================== */

.next-question-btn:active{

    transform:scale(.98);

}

/* ===========================
Disabled State
=========================== */

.next-question-btn:disabled{

    background:#374151;

    color:#9CA3AF;

    cursor:not-allowed;

    box-shadow:none;

    transform:none;

}

/* ===========================
Enabled State
=========================== */

.next-question-btn.enabled{

    background:#F59E0B;

    color:#FFFFFF;

}

/* =========================================================
END OF SECTION 05 CSS
========================================================= */



    
</style>

</head>

<body>

<!-- =========================================================
SECTION 01
QUIZ PAGE HEADER HTML
========================================================= -->

<header class="quiz-header">

    <!-- ==========================
    Back Button
    =========================== -->

    <button class="quiz-back-btn" id="quizBackBtn">

        ←

    </button>

    <!-- ==========================
    Logo Area
    =========================== -->

    <div class="quiz-logo-area">

        <h1 class="quiz-logo">

            <span class="logo-white">QUIZ</span><span class="logo-orange">CANO</span>

        </h1>

        <p class="quiz-tagline">

            Play • Learn • Win

        </p>

    </div>

    <!-- ==========================
    Question Counter
    =========================== -->

    <div class="question-counter">

        <span id="currentQuestion">

            1

        </span>

        <span class="counter-divider">

            /

        </span>

        <span id="totalQuestions">

            20

        </span>

    </div>

</header>
<!-- =========================================================
SECTION 01
QUIZ PAGE HEADER HTML
========================================================= -->
<!-- =========================================================
SECTION 02
QUIZ PROGRESS & TIMER HTML
========================================================= -->

<section class="quiz-progress-section">

    <!-- ==========================
    Progress Header
    =========================== -->

    <div class="progress-header">

        <span class="progress-title">

            Quiz Progress

        </span>

        <span class="timer-text">

            ⏱️
            <span id="countdownTimer">

                20

            </span>s

        </span>

    </div>

    <!-- ==========================
    Progress Bar
    =========================== -->

    <div class="progress-bar-container">

        <div class="progress-bar-fill"
             id="progressBarFill">

        </div>

    </div>

</section>

<!-- =========================================================
END OF SECTION 02 HTML
========================================================= -->
<!-- =========================================================
SECTION 03
QUIZ QUESTION IMAGE HTML
========================================================= -->

<section class="question-section">

    <!-- ==========================
    Question Card
    =========================== -->

    <div class="question-card">

        <!-- Question Number -->

        <div class="question-label">

            Question

        </div>

        <!-- Question Image -->

        <div class="question-image-container">

            <img
                id="questionImage"
                class="question-image"
                src="question-placeholder.jpg"
                alt="Quiz Question">

        </div>

    </div>

</section>

<!-- =========================================================
END OF SECTION 03 HTML
========================================================= -->
<!-- =========================================================
SECTION 04
QUIZ ANSWER SELECTOR HTML
========================================================= -->

<section class="answer-section">

    <div class="answer-container">

        <!-- Option A -->

        <button
            class="answer-circle"
            data-option="A">

            A

        </button>

        <!-- Option B -->

        <button
            class="answer-circle"
            data-option="B">

            B

        </button>

        <!-- Option C -->

        <button
            class="answer-circle"
            data-option="C">

            C

        </button>

        <!-- Option D -->

        <button
            class="answer-circle"
            data-option="D">

            D

        </button>

    </div>

</section>

<!-- =========================================================
END OF SECTION 04 HTML
========================================================= -->
<!-- =========================================================
SECTION 05
QUIZ NEXT BUTTON HTML
========================================================= -->

<section class="next-section">

    <!-- ==========================
    Next Question Button
    =========================== -->

    <button
        id="nextQuestionBtn"
        class="next-question-btn"
        disabled>

        Next Question →

    </button>

</section>

<!-- =========================================================
END OF SECTION 05 HTML
========================================================= -->



    
<script>
/* =========================================================
SECTION 01
QUIZ PAGE HEADER JAVASCRIPT
========================================================= */

/* ===========================
Variables
=========================== */

const quizBackBtn =
document.getElementById("quizBackBtn");

const currentQuestion =
document.getElementById("currentQuestion");

const totalQuestions =
document.getElementById("totalQuestions");

/* ===========================
Quiz Settings
=========================== */

let currentQuizQuestion = 1;

const quizTotalQuestions = 20;

/* ===========================
Load Counter
=========================== */

function loadQuestionCounter(){

    currentQuestion.textContent =
    currentQuizQuestion;

    totalQuestions.textContent =
    quizTotalQuestions;

}

/* ===========================
Back To Home
=========================== */

quizBackBtn.addEventListener("click",function(){

    const leaveQuiz = confirm(

        "Leave this quiz and return to the Home page?"

    );

    if(leaveQuiz){

        window.location.href = "index.html";

    }

});

/* ===========================
Start
=========================== */

loadQuestionCounter();

/* =========================================================
END OF SECTION 01 JAVASCRIPT
========================================================= */
/* =========================================================
SECTION 02
QUIZ PROGRESS & TIMER JAVASCRIPT
========================================================= */

/* ===========================
Timer Settings
=========================== */

let countdownTime = 20;

let timerInterval = null;

let questionAnswered = false;

/* ===========================
Section 02 Elements
=========================== */

const countdownTimer =
document.getElementById("countdownTimer");

const progressBarFill =
document.getElementById("progressBarFill");

const timerText =
document.querySelector(".timer-text");

/* ===========================
Start Countdown
=========================== */

function startCountdown(){

    clearInterval(timerInterval);

    countdownTime = 20;

    questionAnswered = false;

    updateTimerUI();

    timerInterval = setInterval(function(){

        if(questionAnswered){

            clearInterval(timerInterval);

            return;

        }

        countdownTime--;

        updateTimerUI();

        /* Warning at last 5 seconds */

        if(countdownTime <= 5){

            timerText.classList.add("timer-warning");

            if(navigator.vibrate){

                navigator.vibrate(80);

            }

        }

        /* Time Up */

        if(countdownTime <= 0){

            clearInterval(timerInterval);

            timerText.classList.remove("timer-warning");

            autoNextQuestion();

        }

    },1000);

}

/* ===========================
Update Timer UI
=========================== */

function updateTimerUI(){

    countdownTimer.textContent = countdownTime;

    const progress =
    (countdownTime / 20) * 100;

    progressBarFill.style.width =
    progress + "%";

}

/* ===========================
Stop Timer
=========================== */

function stopCountdown(){

    questionAnswered = true;

    clearInterval(timerInterval);

}

/* ===========================
Auto Next Question
=========================== */

function autoNextQuestion(){

    console.log("Time Out");

    /* Section 05 will control
       loading the next question */

}

/* ===========================
Reset Timer
=========================== */

function resetCountdown(){

    timerText.classList.remove("timer-warning");

    startCountdown();

}

/* ===========================
Start First Question
=========================== */

startCountdown();

/* =========================================================
END OF SECTION 02 JAVASCRIPT
========================================================= */
/* =========================================================
SECTION 03
QUIZ QUESTION IMAGE JAVASCRIPT
========================================================= */

/* ===========================
Question Image Element
=========================== */

const questionImage =
document.getElementById("questionImage");

/* ===========================
Question Image Placeholder
=========================== */

const placeholderImage =
"question-placeholder.jpg";

/* ===========================
Current Question Image
=========================== */

let currentQuestionImage =
placeholderImage;

/* ===========================
Load Question Image
=========================== */

function loadQuestionImage(imageSrc){

    questionImage.classList.add("loading");

    const imageLoader = new Image();

    imageLoader.onload = function(){

        questionImage.src = imageSrc;

        questionImage.classList.remove("loading");

    };

    imageLoader.onerror = function(){

        questionImage.src = placeholderImage;

        questionImage.classList.remove("loading");

    };

    imageLoader.src = imageSrc;

}

/* ===========================
Next Question Image
=========================== */

function updateQuestionImage(imageSrc){

    currentQuestionImage = imageSrc;

    loadQuestionImage(currentQuestionImage);

}

/* ===========================
First Question
=========================== */

loadQuestionImage(currentQuestionImage);

/* =========================================================
END OF SECTION 03 JAVASCRIPT
========================================================= */
/* =========================================================
SECTION 04
QUIZ ANSWER SELECTOR JAVASCRIPT
========================================================= */

/* ===========================
Answer Circle Elements
=========================== */

const answerCircles =
document.querySelectorAll(".answer-circle");

/* ===========================
Selected Answer
=========================== */

let selectedAnswer = null;

let answerTime = 0;

/* ===========================
Disable All Answers
=========================== */

function disableAnswers(){

    answerCircles.forEach(function(circle){

        circle.classList.add("disabled");

    });

}

/* ===========================
Reset Answers
=========================== */

function resetAnswers(){

    selectedAnswer = null;

    answerCircles.forEach(function(circle){

        circle.classList.remove("selected");

        circle.classList.remove("disabled");

    });

}

/* ===========================
Enable Next Button
=========================== */

function enableNextButton(){

    const nextButton =
    document.getElementById("nextQuestionBtn");

    if(nextButton){

        nextButton.disabled = false;

        nextButton.classList.add("enabled");

    }

}

/* ===========================
Select Answer
=========================== */

answerCircles.forEach(function(circle){

    circle.addEventListener("click",function(){

        /* Already Selected */

        if(selectedAnswer !== null){

            return;

        }

        /* Save Selected Answer */

        selectedAnswer =
        this.dataset.option;

        /* Save Response Time */

        answerTime =
        20 - countdownTime;

        /* Remove Previous */

        answerCircles.forEach(function(btn){

            btn.classList.remove("selected");

        });

        /* Highlight */

        this.classList.add("selected");

        /* Stop Timer */

        stopCountdown();

        /* Lock Answers */

        disableAnswers();

        /* Enable Next Button */

        enableNextButton();

        console.log(

            "Answer:",
            selectedAnswer

        );

        console.log(

            "Response Time:",
            answerTime,
            "Seconds"

        );

    });

});

/* =========================================================
END OF SECTION 04 JAVASCRIPT
========================================================= */
/* =========================================================
SECTION 05
QUIZ NEXT BUTTON JAVASCRIPT
========================================================= */

/* ===========================
Next Button Element
=========================== */

const nextQuestionBtn =
document.getElementById("nextQuestionBtn");

/* ===========================
Next Question
=========================== */

nextQuestionBtn.addEventListener("click",function(){

    /* Prevent Clicking When Disabled */

    if(this.disabled){

        return;

    }

    /* Move To Next Question */

    currentQuizQuestion++;

    /* Quiz Finished */

    if(currentQuizQuestion > quizTotalQuestions){

        window.location.href =
        "offer.html";

        return;

    }

    /* Update Counter */

    loadQuestionCounter();

    /* Reset Answer Buttons */

    resetAnswers();

    /* Disable Next Button */

    this.disabled = true;

    this.classList.remove("enabled");

    /* Restart Timer */

    resetCountdown();

    /* Update Progress Bar */

    const completed =
    ((currentQuizQuestion - 1) /
    quizTotalQuestions) * 100;

    progressBarFill.style.width =
    completed + "%";

    /* ===========================
    Load Next Question
    (Firestore Section Later)
    =========================== */

    console.log(

        "Loading Question",
        currentQuizQuestion

    );

});

/* =========================================================
END OF SECTION 05 JAVASCRIPT
========================================================= */    

</script>

</body>

</html>

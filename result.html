<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QUIZCANO - Quiz Result</title>

<style>

/* =========================================================
SECTION 01
RESULT PAGE CSS
========================================================= */

/* ===========================
Reset
=========================== */

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

body{

    background:#0B1120;

    font-family:Arial,Helvetica,sans-serif;

    color:#FFFFFF;

}

/* ===========================
Header
=========================== */

.result-header{

    width:100%;

    padding:25px 20px;

    text-align:center;

}

/* ===========================
Logo
=========================== */

.logo{

    font-size:34px;

    font-weight:900;

}

.logo span:first-child{

    color:#FFFFFF;

}

.logo span:last-child{

    color:#F59E0B;

}

/* ===========================
Tagline
=========================== */

.tagline{

    margin-top:6px;

    font-size:13px;

    color:#8B93A7;

}

/* ===========================
Result Card
=========================== */

.result-card{

    width:92%;

    max-width:520px;

    margin:20px auto;

    background:#111827;

    border:2px solid #F59E0B;

    border-radius:14px;

    padding:25px;

    text-align:center;

}

/* ===========================
Trophy
=========================== */

.result-icon{

    font-size:70px;

    margin-bottom:15px;

}

/* ===========================
Title
=========================== */

.result-title{

    font-size:28px;

    font-weight:800;

    margin-bottom:20px;

}

/* ===========================
Score
=========================== */

.score{

    font-size:48px;

    font-weight:900;

    color:#F59E0B;

}

/* ===========================
Summary
=========================== */

.summary{

    margin-top:18px;

    font-size:18px;

    color:#D1D5DB;

    line-height:1.8;

}

/* ===========================
Review Section
=========================== */

.review-section{

    width:92%;

    max-width:520px;

    margin:20px auto;

}

/* =========================================================
END OF SECTION 01
========================================================= */

</style>

</head>

<body>

<!-- =========================================================
SECTION 01
RESULT PAGE HTML
========================================================= -->

<header
class="result-header">

<h1
class="logo">

<span>QUIZ</span><span>CANO</span>

</h1>

<p
class="tagline">

Play • Learn • Win

</p>

</header>

<div
class="result-card">

<div
class="result-icon">

🏆

</div>

<h2
class="result-title">

Quiz Completed!

</h2>

<div
class="score"
id="scoreText">

0 / 0

</div>

<div
class="summary"
id="summaryText">

Loading your results...

</div>

</div>

<div
class="review-section"
id="reviewSection">

</div>

<!-- =========================================================
END OF SECTION 01
========================================================= -->
<script>
/* =========================================================
SECTION 02
LOAD QUIZ RESULT
========================================================= */

/* ===========================
Load Saved Result
=========================== */

const quizResult =
JSON.parse(
localStorage.getItem("quizResult")
);

/* ===========================
Check Result
=========================== */

if(!quizResult){

    alert("No quiz result found.");

    window.location.href = "index.html";

}

/* ===========================
Display Score
=========================== */

document.getElementById("scoreText").textContent =
quizResult.score + " / " + quizResult.total;

/* ===========================
Display Summary
=========================== */

document.getElementById("summaryText").innerHTML =

"Percentage: <b>" +

quizResult.percentage +

"%</b><br><br>" +

"Correct Answers: <b>" +

quizResult.score +

"</b><br>" +

"Wrong Answers: <b>" +

(quizResult.total - quizResult.score) +

"</b>";

/* =========================================================
END OF SECTION 02
========================================================= */

</script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>QUIZCANO - Quiz Result</title>

<style>

/* =========================================================
SECTION 01
RESULT PAGE CSS
========================================================= */

/* ===========================
Reset
=========================== */

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

body{

    background:#0B1120;

    font-family:Arial,Helvetica,sans-serif;

    color:#FFFFFF;

}

/* ===========================
Header
=========================== */

.result-header{

    width:100%;

    padding:25px 20px;

    text-align:center;

}

/* ===========================
Logo
=========================== */

.logo{

    font-size:34px;

    font-weight:900;

}

.logo span:first-child{

    color:#FFFFFF;

}

.logo span:last-child{

    color:#F59E0B;

}

/* ===========================
Tagline
=========================== */

.tagline{

    margin-top:6px;

    font-size:13px;

    color:#8B93A7;

}

/* ===========================
Result Card
=========================== */

.result-card{

    width:92%;

    max-width:520px;

    margin:20px auto;

    background:#111827;

    border:2px solid #F59E0B;

    border-radius:14px;

    padding:25px;

    text-align:center;

}

/* ===========================
Trophy
=========================== */

.result-icon{

    font-size:70px;

    margin-bottom:15px;

}

/* ===========================
Title
=========================== */

.result-title{

    font-size:28px;

    font-weight:800;

    margin-bottom:20px;

}

/* ===========================
Score
=========================== */

.score{

    font-size:48px;

    font-weight:900;

    color:#F59E0B;

}

/* ===========================
Summary
=========================== */

.summary{

    margin-top:18px;

    font-size:18px;

    color:#D1D5DB;

    line-height:1.8;

}
/* ===========================
Percentage Badge
=========================== */

.percentage-badge{

    display:inline-block;

    margin-top:15px;

    padding:10px 22px;

    background:#F59E0B;

    color:#FFFFFF;

    font-size:28px;

    font-weight:900;

    border-radius:50px;

}

/* ===========================
Star Rating
=========================== */

.star-rating{

    margin-top:18px;

    font-size:34px;

    letter-spacing:4px;

    color:#FFD54A;

}

/* ===========================
Achievement Title
=========================== */

.achievement-title{

    margin-top:18px;

    font-size:24px;

    font-weight:900;

    color:#22C55E;

}

    
/* ===========================
Review Section
=========================== */

.review-section{

    width:92%;

    max-width:520px;

    margin:20px auto;

}

/* =========================================================
END OF SECTION 01
========================================================= */

</style>

</head>

<body>

<!-- =========================================================
SECTION 01
RESULT PAGE HTML
========================================================= -->

<header
class="result-header">

<h1
class="logo">

<span>QUIZ</span><span>CANO</span>

</h1>

<p
class="tagline">

Play • Learn • Win

</p>

</header>

<div
class="result-card">

<div
class="result-icon"
id="resultIcon">

🏆

</div>

<h2
class="result-title">

Quiz Completed!

</h2>

<div
class="score"
id="scoreText">

0 / 0

</div>

<div
class="percentage-badge"
id="percentageBadge">

0%

</div>

<div
class="star-rating"
id="starRating">

☆☆☆☆☆

</div>

<div
class="achievement-title"
id="achievementTitle">

Loading...

</div>

<div
class="summary"
id="summaryText">

Loading your results...

</div>

</div>

<div
class="review-section"
id="reviewSection">

</div>

<!-- =========================================================
END OF SECTION 01
========================================================= -->
<script>
<script>
/* =========================================================
SECTION 02
LOAD QUIZ RESULT
========================================================= */

/* ===========================
Load Saved Result
=========================== */

const quizResult =
JSON.parse(
localStorage.getItem("quizResult")
);

/* ===========================
Check Result
=========================== */

if(!quizResult){

    alert("No quiz result found.");

    window.location.href = "index.html";

}

/* ===========================
Display Score
=========================== */

document.getElementById("scoreText").textContent =
quizResult.score + " / " + quizResult.total;

/* ===========================
Summary Message
=========================== */

document.getElementById("summaryText").innerHTML =
"Great job completing this quiz!";

/* ===========================
Statistics
=========================== */

document.getElementById("accuracyValue").textContent =
quizResult.percentage + "%";

document.getElementById("correctValue").textContent =
quizResult.score;

document.getElementById("wrongValue").textContent =
quizResult.total - quizResult.score;

/* ===========================
Temporary Time Values
(Will become dynamic later)
=========================== */

document.getElementById("averageTime").textContent =
"0 sec";

document.getElementById("fastestTime").textContent =
"0 sec";

document.getElementById("slowestTime").textContent =
"0 sec";

document.getElementById("totalTime").textContent =
"0 sec";

/* ===========================
Animated Progress Bar
=========================== */

setTimeout(()=>{

    document.getElementById("resultProgressFill").style.width =
    quizResult.percentage + "%";

},300);

/* ===========================
Percentage Badge
=========================== */

document.getElementById("percentageBadge").textContent =
quizResult.percentage + "%";

/* ===========================
Star Rating
=========================== */

let stars = "";

if(quizResult.percentage >= 90){

    stars = "★★★★★";

}
else if(quizResult.percentage >= 80){

    stars = "★★★★☆";

}
else if(quizResult.percentage >= 60){

    stars = "★★★☆☆";

}
else if(quizResult.percentage >= 40){

    stars = "★★☆☆☆";

}
else{

    stars = "★☆☆☆☆";

}

document.getElementById("starRating").textContent =
stars;

/* ===========================
Achievement Badge
=========================== */

let badge = "";

if(quizResult.percentage >= 90){

    badge = "🏆 QUIZ MASTER";

}
else if(quizResult.percentage >= 80){

    badge = "🥇 EXCELLENT";

}
else if(quizResult.percentage >= 60){

    badge = "🎯 GREAT JOB";

}
else if(quizResult.percentage >= 40){

    badge = "💪 KEEP PRACTICING";

}
else{

    badge = "🔥 NEVER GIVE UP";

}

document.getElementById("achievementTitle").textContent =
badge;

/* =========================================================
END OF SECTION 02
========================================================= */

</script>
</body>

</html>
